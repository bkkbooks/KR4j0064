body:
  text: 梅苑卷四宋黄大輿編蠟梅香呉師孟錦里陽和看萬木凋時早梅獨秀珍館瓊樓時正絳跗初吐穠華將茂國豔天葩真澹竚雪肌清瘦似廣寒宫鉛華未御自然妝就凝睇倚朱䦨噴清香暗度易襲襟袖好與花爲主宜秉燭頻觀汎湘酎莫待南枝随樂府新聲吹後對賞心人良辰好景須信難偶又喻仲明晚日初長正錦里輕陰小寒天氣未報春消息喜痩梅先發淺苞纖蘂揾玉勻香天賦與風流標致問隴頭人音容萬里待憑誰寄一様晚妝新倚朱樓凝盼素英如墜映月臨風處度㡬聲羌管惹愁思電轉光陰須信道飄零容易且頻歡賞柔芳正好滿簪同醉又愛日初長正園林纔見萬木凋黄檻外朝來巳見數枝復欲掩映廽廊賜與東皇付芳信妝㸃江鄉想玉樓中誰家艶質試學新妝桃杏苦㝷芳縱成蹊豈能似恁清香素艶妖嬈應是盡夜曽與明月風光瑞雪氷霜渾疑是粉蝶輕狂待􅍆吟賞休聽畫樓横管悲傷滿江紅春欲來時正是與梅花有約又還是竹溪深處一枝開却對酒漸知身老大看花應念人離索但十分沉醉囑東君長如昨荒草渡孤山泊山歛黛天垂幕黯銷魂無奈暮雲殘角便好折來和雪戴莫教酒醒隨風落待殷勤留取寄相思誰堪託又林外溪邉深深見一林寒雪惟覺有襲人襟袖暗香不絶天與風流標格在肯同桃李開時節也須煩玉手折將來和明月調鼎事君休説龍笛韻空悲咽將何助清賞待傳佳闋君不見廣平詞賦麗揮毫弄翰心如鐵便直饒何遜在揚州成虛設選冠子憔悴江山淒涼古道寒日澹煙殘雪行人立馬手折江梅紅蕚素英初發月下瑶臺弄玉飛瓊不老年年春色被東君喚遣嬈紅高韻且饒清白因動感野水溪橋竹籬茅舎倚似玉堂金闕天教占了苐一枝春何處不宜風月休問庾嶺止渴金鼎調羮有誰如得傲氷霜雅態清香花裏自稱三絶又庾嶺煙光江南風景冷落嵗寒庭院疎枝凍折孤根獨犯曉霜回暖蕚㸃胭脂粉凝芳葉依稀㡬枝初綻上層樓月夜凭䦨風送暗香清逺嗟往昔漢妃臨鸞新妝才飾艶絶人間金鈿東君信息造化工夫却笑衆葩開晚若是芳菲迅速終與和羮鳯池仙館願樓頭羌笛休吹免使爲花腸斷落梅慢帯煙和雪繁枝澹竚誰將粉融酥滴疎枝冷蘂壓羣芳年年常占春色江路溪橋謾倒褭褭風中無力香浮動氷姿明月裏想無花比高格争奈光陰瞬息動幽怨潛生羌笛新花鬭巧有天然閒態倚䦨堪惜零亂殘英片片飛上舞筵歌席斷腸忍淚念前期經嵗還有芳容隔早梅春北帝收威又探得旱梅漏春消息粉蘂瓊苞擬將胭脂輕染顔色素質盈盈終不許雪霜欺得奈化工闕偏宜賦與壽陽妝飾獨自逞氷姿比夭桃繁杏殊别爲報山翁逄此有花樽前且須攀折醉賞吟戀莫辜負好天風月恐笛聲悲紛紛便似亂飛香雪馬家春慢珠箔風輕繡簾浪捲乍入人間蓬島鬭玉䦨干漸庭館簾櫳春曉天許竒葩貴品異繁杏夭桃輕巧命化工傾國風流付與一枝纎妙樽前五陵年少縱丹青異格難别顔貎悲露凝煙困紅嬌額微顰低笑須信濃香易歇更莫惜醉攀吟遶待舞蝶遊蜂細把芳心都告望梅王聖與畫欄人寂喜輕盈照水犯寒先拆裊芳枝雲縷鮫綃露淺淺塗黄漢宫嬌額翦玉裁氷巳占斷江南春色恨風前素艶雪裏晴香偶成抛擲如今眼穿故園待拈花嗅蘂時話思憶想隴頭依約飄零甚千里芳心杳無消息粉怯珠愁又只恐吹殘𦍑笛正斜飛半窓曉月夢回隴驛又小寒時節正同雲暮慘勁風朝烈信早梅偏占陽和向日暖臨溪一枝先發時有香來望明艶瑤枝非雪想玲瓏嫩蘂綽約横斜旖旎清絶仙姿更誰並列有幽香映水疎影籠月且大家留倚䦨干對緑醑飛觥錦箋吟閱桃李繁華奈比此芬芳俱别等和羮大用休把翠條謾折永遇樂梅贈客南山居士滿眼寒姿桂蟾勻素霜女同瑩野屋噴香池波弄影髣髴鸞窺鏡一枝堪寄天涯逺信惆悵塞鴻難倩這情懐厭厭怎向無人伴我孤另風凄露冷仙郎此夜若許枕衾相並解吐芳心綢繆共約學取雙交頸好天難遇從今一去荏苒後期無定把柔腸千縈萬斷爲伊薄倖又客答梅玉骨氷肌野牆山徑烟雨蕭索公子豪華貪紅戀紫誰分憐孤蕚想應窺見潘毛相似故把素懐相託豈知人年來悶損苦被名利拘縛當歌對酒如癡如夢欲笑啼㾗先落二十年前歡娯一醉不忍思量著衾寒枕冷不教孤另不是自家情薄枉將心千尤萬殢筭應殢著洞仙歌年年青眼爲江梅腸斷一句新詩思無限向碧瓊枝上白玉葩中春猶淺一㸃龍涎清逺誰抛傾國艶昨夜前村都怨東皇未曽見正紅杏倚雲時覺香銷驚何許飄零千片待氷雪叢中看竒姿解一笑春姸盡回仙苑又蓬萊宫殿去人間三萬玉體仙娥有誰見彼月明雪友邀下瓊樓溪橋畔相對寒光淺淺一般天上格獨帶真香氷麝猶嫌未清逺似太真望幸一餉銷凝愁未慣消痩難禁素練又只恐東風破寒來伴神女同歸閬峰仙苑又摧殘萬物不忍臨軒檻待得春來是早晚向紛紛雪裏開一枝兒清香滿漏泄東君先綻暗香浮動踈影横斜只這些兒意不淺怎禁他澹澹地勻粉彈紅争些兒羞殺桃腮杏臉爲傳語東風共垂楊奈辛苦千絲葛絲撩亂又斷雲踈雨冷落空山道匹馬駸駸又重到望孤村兩三間茅屋踈籬溪水畔一簇蘆花晚照㝷思行樂地事去無㾗回首湘波與天杳歎人生㡬度能醉金釵青鏡裏贏得朱顔未老入枝頭一㸃破黄昏問客路春風爲誰開早又梳風洗雨蘭蕙摧殘後玉蘂檀芳做霜曉板橋平溪岸小月下歸來乗露冷贏得清香滿抱一枝春在手細嗅重有風味人間自然少擬欲問東君妙語難㝷搜索盡池塘春草想不是詩人賞幽姿縱竹外横斜是誰知道又廣寒曉駕姑射㝷仙侶偷被霜華送將去過越嶺棲息南枝勻妝靣凝酥輕聚愛横管孤吹隴頭聲盡拚得幽香爲君分付水亭山驛衰草斜陽無限行人斷腸處盡爲我留得多情何須待春風相顧任倒斷深思向梨花也無奈寒食㡬畨春雨摸魚兒嵗華向晚遥天布同雲霰雪輕飛前村昨夜漏春光楚梅先放南枝嘆東君運巧思裁瓊鏤玉妝繁蘂花中偏異解向嚴冬逞芳菲免使遊蜂粉蝶戲梁臺上漢宫裏殷勤仗高樓𦍑管休吹何妨留取憑䦨干大家吟翫歡醉待明年念芳草王孫萬里歸未得仙源應是又被花開向天涯淚灑東風對桃李春雪間早梅梅將雪共春彩豔灼灼不相因逐吹霏霏能争宻排枝碎碎巧妝新誰令香來滿座獨使浄歛無塵芳意饒呈瑞寒光助照人玲瓏次第開巳遍㸃綴坐來頻那是俱懐疑似須知造化兩各逼天真熒煌艷開初亂眼浩蕩逸氣忽迷神未許瓊花觀裏從將玉樹相親先期迎獻嵗更同歌酒占兹辰六華蠟蔕相輝映輕盈敢自珍萬年歡王和父雅出羣芳占春前信息臘後風光野岸郵亭繁似萬㸃輕霜清淺溪流倒影更黯澹月色籠香渾疑是姑射氷姿壽陽粉靣初妝多情對景易感况淮天庾嶺迢逓相望愁聽清吟悽絶畫角悲凉念昔因誰醉賞向此際空惱危腸終須待結實和羮恁時佳味堪嘗又北陸風回頓園林凋盡庭院岑寂瀟灑寒梅偷報艶陽消息素澹英姿粹質天賦與出倫標格一枝向雪裏初開見説清香㝷得神仙乍離姑射更瓊妝翠佩氷瑩肌骨髣髴華清浴罷懶勻脂澤隴上休轟怨笛且留取纍纍成實終須待金鼎調羮偏與羣芳春色又晁無咎心憶春歸似佳人未來香逕無跡雪裏江梅因甚早知春色百卉羣芳正寂夜不寐幽姿脈脈圖清曉先作宫妝似防人見偷摘真香媚動清魂算當時壽陽無比標格應記揚州何郎舊曽相識花似何郎鬢白恐花笑逄花羞摘那堪愁𦍑笛鶯心也隨繁杏抛擲又天氣嚴凝乍寒梅數枝嶺上開拆傅粉凝脂疑是素娥妝飾先報陽和信息更雪月交光一色因追念徃日歡逰共君㩦手同摘别來又經嵗隔奈高樓夢斷無計㝷覔冷豔寒容啼雨恨烟愁濕似向人前淚滴怎不使伊家思憶惟只恐寂寞空枝又隨昨夜𦍑笛上林春慢曽公衮東苑梅繁尊酒行樂醉倒花前狂客靚妝微歩攀條弄粉凌波遍㝷青陌暗香墮靨更飄近霧鬟蟬額倒金荷念流光易失幽姿堪惜惜花心未甘鬢白南枝上又見㝷芳消息舊游回首前歡如夢誰知等閒抛擲稠紅亂蘂漫開遍楚江南北獨消魂念誰寄故園春色雨中花夢破江南春信漸入江梅暗香初發乞與横斜疎影爲憐清絶梁苑相如平生有賦未甘華髪便廣寒争遣韶華驚怨詎妨輕折揚州二十四橋歌吹不道畫樓聲歇生怕有江邉一樹要堆輕雪老去苦無歡事凌波空有纎襪恨無好語何郎風味定教誰説早梅芳氷唯清玉唯潤清潤無風韻此花風韻自然清潤傳香粉故應春意别不使凡英恨到春前臘後長是寄芳信此情閒此意逺一㸃縈方寸風亭水館解與行人破離恨廣寒宫未有姑射仙曽認向雪中月下吟未盡婆羅門引江南地暖數枝先得嶺頭春分付似翦玉裁氷素質偏憐勻澹羞殺壽陽人算多情留意偏在東君暗香旋生對澹月與黄昏寂寞誰家院宇斜掩重門牆頭半開却望雕鞍無故人斷腸處容易飄零江神子晁無咎去年初見早梅芳一春忙短紅牆馬上不禁花惱只顛狂蘇晋長齋猶好事時喚我舉離觴今年春事更茫茫淺宫妝斷人腸一㸃多情無與國中香頼有飛鳧賢令尹同我過小横塘又郭仲宣臘寒猶重見年芳爲花忙傍雕牆凖擬廵簷一笑但清狂冷蘂踈枝渾不奈憑折取泛清觴揚州春夢雨微茫記娥妝耿氷腸春信全通何用玉奩香誰見月斜人去後踈影亂蘸寒塘踏青遊趙温之竹外溪邉一枝破寒衝臘瑩素肌玉雕氷刻賦閒標足餘韻豈同常格最流風生來處處盡好别得造化工力踈影幽情意思迥然殊絶算不枉詩人分别凍雲深凉月皎愈増清冽大瀟灑尤得静中雅趣不許鶯棲燕歇又嶺上梅殘堤畔栁眠嬌小綻數枝横煙臨沼既大雅且穠麗繁而不擾冒寒來遊蜂戯蝶尚阻年年占得春早澹白輕紅清香乍迎芳道更情與碧天如掃魏臺妝呉姬袖妖妍多少爲傳語無言分付桃李不比閒花浪草連理枝邵叔齊澹泊踈籬隔寂寞官橋側緑萼青枝風塵外别是一般姿質念天涯憔悴各飄零記初曽相識雪裏清寒逼月下幽香襲不似薄情無憑凖一去音書難得看年年時候不踰期報陽和消息撲蝴蝶邵叔齊蘭摧蕙折霜重曉風惡長安何處孤根謾自托水寒斷續溪橋月破黄昏簾幙相逄儼然瘦削最蕭索星星蓬鬢杳杳家山路正邈攀枝喚蘂露暗清淚閣已無蝶使蜂媒不共鶯期燕約甘心伴人澹泊絳都春東君運巧向枝頭㸃綴瓊英雖小全是一般風味花中最輕妙横斜踈影當池沼似弄粉初臨鸞照衆芳皆有深紅淺白豈能争早莫厭金樽頻倒把芳酒賞花追陪歡笑有願告天願天多情休教老竒花也願休殘了免樂事離多歡少易老難叙𠂻腸算天怎表雪梅香嵗將暮雲㠶風捲正凄凉見梅花呈瑞素英澹薄含芳千片逞姿向江國一枝無力倚鄰牆凝眸望昨夜前村雅態難忘争强鬭鮮潔皓彩寒輝冷豔清香姑射真人更兼粉傅容光梁苑竒才動佳句漢宫嬌態學嚴妝無憀恨獨對光輝别岸垂楊又凍雲深瑶花六出滿長空漸飄來呈瑞皚皚萬里皆同荒野枯枝竦欲折小亭寒蕋吐輕紅暗香清疎影横斜照水溶溶臨風傳芳信驛使來自庾嶺南峰占早争先縂無粉蝶遊踪妝㸃鮮妍漢殿裏笛吹嗚咽畫樓東賞南枝倚䦨凝望時見征鴻梅苑巻四
