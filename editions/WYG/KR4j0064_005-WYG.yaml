body:
  text: 梅苑巻五宋黄大輿編惜黄花許冲元鴈聲曉斷寒霄雲捲正一枝開風前看月下見花占千花上香笑千香淺化工與最争先裁翦誰把瑶林閒抛江㟁恁素英濃芳心細意何限不恨宫妝色不怨吹𦍑管恨天逺恨春來晩梅花令孫光憲數枝開與短牆平見雪蕚紅跗相映引起離人邉塞情簾外欲三更吹斷離愁月正明空聽隔江聲望梅花同前格歐陽永叔春草全無消息臘雪猶餘蹤跡越嶺寒枝香自折冷艶竒芳堪惜何事壽陽無處覔吹入誰家羌笛千秋嵗臘殘春近江上梅開粉一枝漏泄東君信壽陽妝面靚姑射氷姿瑩似淺杏清香試與分明認只恐霜侵破又怕風吹損待折取還不忍莫將花上貎來㸃多情鬢凝睇久行人立馬成遺恨眼兒媚李德載雪兒魂在水雲鄉猶憶學梅妝玻瓈枝上體薫山麝色帶飛霜水邊竹外愁多少不斷俗人腸如何伴我黄昏擕手歩月斜廊又王望之凌寒低亞出牆枝孤瘦雪霜姿嵗華巳晚暗香幽艶自與時違化工放出江頭路沙水冷相宜東風自此别開紅紫是處芳菲又前時同醉曲江濱初様小梅春花殘人逺㡬經風雨結子青青誰知别後無腸斷行盡水雲程修峰萬仞郵亭息鞚獨對黄昏相見歡月明疎影林間水潺潺一㸃濃香十里渡闗山且莫負好分付冷無眠只怕笛聲嗚咽到愁邊擣練子八梅擣練子賦梅枝暖借東風次第吹自是百花留不住讓教先發放春歸擣練子賦梅芳柳緑桃紅謾㸃妝試問仙標横竹外敢同高節伴氷霜擣練子賦梅紅玉體凝酥半醉中詩酒興來須要早忍看紅雨落西東擣練子賦梅香蕙魄蘭魂人再陽只爲人間無着處借他龍笛返仙鄉擣練子賦梅英枝上商量細細生不是根株貪結子被吹𦍑笛兩三聲擣練子賦梅妝鏡裏佳人傅粉忙額子畫成終未是更須插向鬢雲傍擣練子賦梅音雲底江南樹樹深悵望故人千里逺故將春色寄芳心擣練子賦梅青休共檀梨取次争葉底青青如豆小巳知金鼎待和羮梅苑巻五
  hash: sha256:15a9263b11379fd8827fd2fb215eab7f3bebcd3558e98a757bd431da0f52e546
