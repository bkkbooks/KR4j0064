body:
  text: 梅苑巻一宋黄大輿編勝勝慢闕欺寒衝暖占早争先江南又報南枝暗香踈影偏宜映月臨池天然素肌瑩骨笑等閒紅紫芳菲勞夢想正玉人嬌困弄粉妝遲長恐行歌聲斷尤堪恨無情塞管輕吹寄逺丁寧折贈隴首相思前村夜來雪裏滯東君須索饒伊爛漫也算百花猶自不知又嚴凝天氣近臘時節寒梅暗綻踈枝素豔瓊苞盈盈掩映亭池雪中欺寒探暖替東君先報芳菲暗香逺把荒林幽圃景致妝遲别是一般風韻超羣卉不待淡蕩風吹雅態儀容特地惹起相思折來畫堂宴賞向尊前吟咏憐伊漸開盡算閒花野草怎知又寒應消盡麗日添長百花未敢先折冷豔幽香分過溪南春色調酥旋成素蘂向碧瓊枝頭勻滴愁腸斷怕韶華三弄雪映溪側應是酒䦨人静香散處惟見玉肌氷格細細踈風清態爲誰脈脈芳心向人似語也相憐風流詞客待宴賞伴嬌娥和月共摘漢宮春李漢老瀟灑江梅向竹梢踈處横兩三枝東君也不愛惜雪壓霜欺無情燕子怕春寒輕失花朝却是有年年塞鴈歸來曽見開時清淺小溪如練問玉堂何似茆舎踈籬傷心故人去後冷落新詩微雲淡月對江天分付他誰空自憶清香未減風流不在人知又梅蕚知春見南枝向暖一朶初芳冰清玉麗自然賦得幽香煙庭水榭更無花争染春光休謾説桃夭杏冶年年蝶閙蜂忙立馬竚凝情久念美人自别鱗羽茫茫臨岐記伊尚帶宿酒殘妝雲踈雨闊怎知他千里思量除是託多情驛使殷勤折寄仙鄕又雪打風摧正籬枯壁盡却有寒梅衰柳敗蒲礙眼喜見芳蕾江村路曲問青帘與酌餘醅須慿取東君爲我一枝先寄春來寂寞槿門牛巷有清香自倚不怕低回終須㑹逄賞目健歩移栽孤芳素豔敢煩他蜂蝶相陪偏愛有春風靳惜同時不放花開又㸃㸃江梅對寒威强出一卉新竒零珠碎玉爲誰宻上南枝幽香冷豔縱孤高却遣誰知惟只有江頭驛畔征鞍獨爲遲遲聊撚粉香重閣問春來甚日春去何時移將院落算應未肯頭低無人共折傍溪橋雪壓霜欺君不見長安陌上只誇桃李芳菲又蠟梅張子野紅粉苔牆透新春消息梅粉先芳竒葩異卉漢家宮額塗黄何人鬭巧運紫檀翦出蜂房應爲是中央正色東君别與清香仙姿自稱霓裳更孤標俊格非雪凌霜黄昏院落爲誰宻解羅囊銀瓶注水浸數枝小閣幽窗春睡起纖條在手厭厭宿酒殘妝江梅引柳耆卿年年江上見寒梅㡬枝開暗香來疑是月宮仙子下瑶臺冷豔一枝雖在手故人逺相思切寄與誰怨極恨極嗅玉蘂念此情家萬里暮霞散綺楚天外㡬片斜飛爲我多情特地㸃征衣我巳飄零君又老正心碎那堪聞塞管吹水龍吟夜來深雪前村路應是早梅初綻故人贈我江南春信南枝向暖踈影横斜暗香浮動月明清淺向亭邊驛畔行人立馬頻回首空腸斷别有玉溪仙館壽陽人初勻粉面天教占了百花頭上和羮未晩最是傷情處高樓上一聲羌管仗誰人説與東君留取倚䦨干看又雪霏冰結霜凝是誰透得春工意南枝向暖江邊嶺上獨先衆卉閒態幽姿綠窗紅蔕粉英金蘂念氷膚秀骨人間要見除非是真仙子羌管且休横吹待佳人新妝初試鸞臺曉鑑人花相對何須更比踈影横斜暗香浮動月低風細又豈知漸結枝頭翠玉有和羮美又孔方平歲窮風雪飄零望迷萬里雲垂凍紅綃碎翦凝酥繁綴煙深霜重踈影沉波暗香和月横斜浮動悵别來欲把芳菲逺寄還羌笛吹三弄寂寞玉人睡起汚殘妝不勝嬌鳯盈盈山館紛紛客路相思誰共才與風流賦稱清艶多情惟宋算襄王枉被梨花瘦損又成春夢又去年今日關山路踈雨斷魂天氣據鞍驚見梅花的皪籬邊水際一枝折得雪妍氷麗風梳雨洗正水村山館倚䦨愁寄有多少春情意好是孤芳莫比自不分歌梁舞地砌香庭影高禪文友清談相對琴韻初調茗甌催㵸爐薫欲試向此時一段風流付與晉人標致又孔處度數枝凌雪乘氷嫩英半吐瓊酥㸃南州故苑何郎遺詠風臺月觀踈影横斜暗香浮動水寒雲晚笑浮花浪蘂嬌春萬里空零落愁鶯燕遊子寂寞暮景向天邊㡬回相見玉人纖手殷勤攀贈欲待微盼越使歸來漢宫妝罷昭華流怨念湘江夢杳窗前疑是此情何限又淡煙池館霜飇乍𦂳又是年華暮黄花老盡丹楓舞困江梅初吐㸃綴南枝暗傳春信玉苞微露凭危䦨空斷誰家素臉遥山逺空凝竚昨夜一枝開處正前村雪深幽曙看來只恐瑤臺雲散玉京人去庾嶺寒餘漢宮妝曉飛堆行雨仗誰人借取孤芳雅致作春光主念奴嬌李久善東君試手向南枝著意争先時節縱有丹青誰便忍輕㸃肌膚氷雪色借瓊瑰香分蘭麝先自標孤潔衝寒獨秀悞他多少蜂蝶縞練不染緇塵算來只合是廣寒宮闕未問陽和先占取前村一溪風月留取清芬主張眞態驛使休輕折梢頭青子異時風味甚别义朱希眞見梅驚喚問經年何處收香藏白似語如愁還笑我何苦紅塵久客觀裏栽桃仙家種杏總是成踈隔千林無伴淡然獨傲霜雪且與管押春回孤標争肯逐雄蜂雌蝶豈是無情知受了多少凄凉風月寄隴程遥和羮心在忍使芳菲歇溪邊寂寞可憐誰爲攀折又雨肥紅綻把芳心輕吐香噴清絶日暮天寒獨自倚修竹氷清玉潔待得春來百花若見掩面應羞殺當風抵雨犯寒則怕吹霎瀟灑愛出牆東途中遥望巳慰人心渴鬭壓䦨干人面共花面難分優劣嚼蘂㝷香凌波微歩雪沁呉綾襪玉纖折了殢人須要斜插又曾公衮片帆暮落正前村梅蘂愁人如雪南陌西溪長記得踈影横斜時節六出氷姿玉人微歩笑裏輕輕折蘭房沉醉暗香曽共私竊回首萬水千山一枝重見處離腸千結料想臨鸞消瘦損時把啼痕紅浥怎得伊來許多幽恨共撚青梢説如今千里斷魂空對明月又蘇仲及問梅何事對巖東微笑暗中輕馥韻絶姿高直下視紅紫端如童僕遶樹千回臨風三嗅待與論心曲何人還解爲伊特地青目瀟灑些箇精神誰憐孤瘦正無語幽獨不許春知應自負一生風月心足傲雪難陪欺霜無伴耿耿横修竹紛紛桃李看時不覺都俗又邵公濟天然瀟灑盡人間無物堪齊標格只與嫦娥爲伴侶方顯一家顔色好是多情一年一度首作東君客竹籬茆舎典型别是清白惆悵玉杵無慿藍橋人去空鎻神仙宅今日天涯憑馬上忽見輕盈氷魄恰似當年温柔鄉裏曉看新妝額臨風三嗅挽條不忍空摘又歲華漸杪又還是春也難禁愁寂欲探踈梅獨自個㝷訪山村水驛路轉斜谿竹低墻短應是瑶姬宅玉蕤不動月輪寒浸國色回首故國風光只因清好重作江南客堪笑廣平争解我羈旅芳心脈脈不借鉛華枝頭雪霽愈見香肌白高樓且住恁渠一弄𦍑篴又蘭枯蕙死向竹齋深處誰傳消息霜雪藂中渾似箇縹緲呉人標格絳蕚微深瓊苞不露自與塵凡隔黄昏遥見一枝煙淡籠白曽記霧閣雲窗飛香結篆佳句應難得道韞能文終未勝瀟灑風流姿質待到春來滿城桃李相竝無顔色殷勤祝付畫樓休品長笛花心動偏憶江梅有塵表丰儀世外標格低傍小橋斜出踈籬似向隴頭曽識暗香孤韻氷霜裏初不怕春寒要勒問桃李盈門乍生向前争得省共蕭娘去摘纎玉映瓊枝照人一色淡粉暈酥多少工夫到得壽陽宮額再三留待東君管都􅍆醉别花不惜但只恐高樓又三弄笛又蠟梅春欲來時看雪裏新梅品流珍絶氣韻楚江顔色中央數朶巧鎔香蠟嫩苞珠涙圓金燭嬌腮潤蜂房微缺畫欄悄佳人道妝醉吟風月淡白輕紅謾説算何事東君用心偏别賦與異姿添與清香何堪苦寒時節但教開後金尊滿休惆悵落時歌闋斷腸也繁枝爲誰贈折賞南枝曽子固暮冬天地閉正木凍折瑞雪飄飛對景見闕南嶺梅露㡬㸃清雅容姿丹染蕚玉綴枝又豈是一陽有私大抵是化工獨許占却先時霜威莫苦凌持此花根性想羣卉争知貴用在和羮三春裏不管綠是紅非攀賞處宜酒巵醉撚嗅幽香更竒倚䦨干何人去囑𦍑管休吹洞庭春色絳蕚欺寒暗傳春信一枝乍芳向籬邊竹外前村雪裏青梢猶瘦踈影溪傍惹露和煙凝酥豔似瀟灑玉人初試妝江南路有多情竚立迴盡柔腸倚樓最難忘處正皓月千里流光縱廣平心勁難思麗句少陵詩興猶愛清香休怪東君先留意問他日和羮誰又强還輕許笑凌空檜影松蔭交相孤鴈兒并序李易安世人作梅詞下筆便俗予試作一篇乃知前言不妄耳藤牀紙帳朝眠起説不盡無佳思沈香斷續玉罏寒伴我情懐如水笛聲三弄梅心驚破多少春情意小風踈雨蕭蕭地又催下千行淚吹簫人去玉樓空腸斷與誰同倚一枝折得人間天上沒箇人堪寄沁園春山驛蕭踈水亭清楚仙姿太幽望一枝穎脫寒流林外爲傳春信風定香浮斷送光陰還同昨夜葉落從知天下秋憑䦨處對氷肌玉骨姑射來遊無端品笛悠悠似怨感長門人淚流奈微酸已寄青青杪助當年太液調鼎和饈樵嶺漁橋依稀精彩又何藉紛紛俗士求孤標在想繁紅閙紫應與包羞眞珠髻紅梅重重山外苒苒流光又是殘冬時節小園幽徑池邊樓畔翠木嫩條春别纖蘂輕苞粉蕚染猩猩鮮血乍㡬日好景和風次第一齊催發天然香豔殊絶比雙成皎皎倍増芳潔去年因遇東歸使指逺恨意曽攀折豈謂浮雲終不放滿枝明月但歎息時飲金鍾更遶叢叢繁雪逺朝歸金谷先春見乍開江梅晶明玉膩珠簾院落人静雨踈煙細横斜帶月又别是一般風味金尊裏任遺英亂㸃殘粉低墜惆悵杜隴當年念水逺天長故人難寄山城倦眼無緒更看桃李當時醉魄算依舊裵回花底斜陽外謾回首畫樓十二又新律纔交早舊梢南枝朱汚粉膩煙籠淡妝恰值雨膏初細而今看了記他日酸甜滋味多應是伴玉簪鳯釵低亞斜墜迤邐對酒當歌眷戀得芳心竟日何際春光付與尤是見欺桃李叮嚀寄語且莫負尊前花底拚沈醉儘銅壺漏傳三二撃梧桐雪葉紅凋煙林翠減獨有寒梅難並瑞雪香肌碎玉竒姿逈得佳人風韻清標暗折芳心又是輕洩江南春信最好山前水畔幽閒自有横斜踈影盡日凭䦨㝷思無語可惜飄瓊飛粉但悵望王孫未賞空使清香成陣怎得移根帝苑開時不許衆芳近免教向深巖暗谷結成千萬恨泛蘭舟霜月亭亭時節野溪開氷灼故人信付江南歸也仗誰托寒影低横輕香暗度踈籬幽院何在秦樓朱閣稱簾幙攜酒共看依依承醉更堪作雅淡一種天然如雪綴煙薄腸斷相逢手撚嫩枝追思渾似那人淺妝梳掠十月梅千林凋盡一陽未報巳綻南枝獨對霜天冐寒先占花期清香映月浮動臨淺水疎影斜欹孤標不似綠李夭桃取次成蹊縱壽陽妝臉偏宜應未笑天然雅態氷肌寄語高樓凭欄𦍑管休吹東君自是爲主調鼎鼐終付他時從今㸃綴百草千花須待春歸梅苑巻一
