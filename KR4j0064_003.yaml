body:
  text: 梅苑卷三宋黃大輿編喜遷鶯闕南枝向暖乍秀出庾嶺梅英初吐玉頰輕勻瓊腮淡抹姑射冰容相許幾回立馬凝竚影映寒光霜妒春盡占在百花頭上嚴冬獨步芳華春意早昨夜一番雪裏開無數萬蘂千梢鉛堆粉汚總是化工偏賦月明暗香浮動休使龍吟聲苦且留取待時時頻倚䦨干重顧又臘殘春未正後館梅開牆陰雪裏冷豔凝寒孤根回暖昨夜一枝春至素苞暗香浮動别有風流標致謝池月最相宜疏影橫斜臨水誰為傳驛歎隴上故人不見今千里寄與東君徒教知人别後歲寒清意亂山萬疊何在但有飛雲天際故園好早歸來休戀繁桃穠李又趙溫之瓊姿氷體料瑩光乍傳廣寒宮裏北陸寒深南園春裏此後萬花方起翦霞鬭蕚裁蘂自然天與高致大瀟灑最宜雪宜月宜亭宜水好是天涯庾嶺上萬株浮動香千里幈寫橫斜鬟插垂裊占盡秀骨清意醉魂易醒吟興信來佳思無際為傳語向東風甘使無言桃李又霜凝雪沍正斗標臨丑三陽將近萬木凋零羣芳消歇某苑有梅初盛異香似薰沈水素色端如玉瑩人盡道第一番天遣先占春信標韻尤耿耿月觀水亭誰解憐踈影何遜揚州拾遺東閣一見便生清興望林止渴功就不數夭桃繁杏歲寒意看結成秀子歸調商鼎又一陽初起漸庾嶺梅雪才苞香蘂品格清髙姿容閒雅别愛化工深意放開獨占嚴景不使混同凡卉微雨霽似玉容寂寞無言有淚難比凝素態不共豔陽桃杏爭妍麗疑是佳人巧撚香酥枝上玉纎輕綴前村可惜無賞好近天庭階砌成實後有調和鼎鼐一般滋味折紅梅梅花館小鬟吳感喜氷澌初泮微和漸入東郊時節春消息夜來頓覺寒梅數枝爭發玉溪仙館不是個尋常標格化工别與一種風情似勻㸃胭脂染成香雪重吟細閲比繁杏夭桃品格真别只愁共綵雲易散冷落謝池風月慿誰向說三弄處龍吟休咽大家留取時倚䦨干聞有花堪折勸君須折又隴上消殘雪曲水流斷淑氣潛通羣花冷未吐夜來梅蕚數枝繁紅先奪化工發豔色不染東風信憑曉風難壓精神占青春未上别是標容天香漸杳似蓬闕玉妃酒困嫣慵只愁恐上陽愛惜和種移向瑶宫西歸驛使折贈處庾嶺溪東又須寄與多感多情道此花開早未識遊蜂又倚花欄清曉裴回探得南枝初綻通春意漏巧鬬竒東君首先回暖盈盈素靣剛强㸃胭脂深淺是他自有標格清香恣千種妖嬈萬般閒雅移時細看算濃雪嚴霜怎生拘管也擬是小桃未蘂依約杏添清伴笛聲休怨怕恐使羣芳零亂待須把酒守著花枝願期與花枝久長相見又憶笙歌筵上忽見了闕相别紅爐暖畫簾繡閣曽共鬢邊斜插南枝向暖此檻裏春風猶怯也應别後不減芳菲念咫尺䦨干甚時重折清風間發如天與濃香粉勻檀頰紗窗影故人凝處吟落暮天殘雪一軒明月悵望花爭清切便教儘放都不思量也須有驀然上心時節又覩翔南征鴈踈林敗葉凋霜零亂獨紅梅自守嵗寒天教最後開綻盈盈水畔疏影蘸橫斜清淺化工似把深色胭脂怪姑射氷姿剩與紅間誰人寵眷待金鎖不開憑䦨先看曾飛落壽陽粉額妝成漢宫傳滿江南風暖春信喜一枝清逺對酒便好折取竒苞撚清香重嗅舉杯重勸梅花曲以介父三詩度曲劉伯壽漢宫中侍女嬌額半塗黃盈盈粉苞凌時寒玉體先透薄裝好借月魂來娉婷畫燭旁惟恐隨陽春好夢去所思飛揚宜向風亭把盞酬孤豔醉永夕何妨雪徑蘂真凝密降回輿認暗香不為藉我作和羮肯放結手花狂向上林留此占年芳又結子非貪有香不俗宜當鼎鼐嘗偶先紅紫度韶華玉笛占年芳衆花雜色滿上林未能教臘雪埋藏却怕春風漏泄一一盡天香不須更御鉛黃知骨色禀自天真殊常紙裁雲縷奈芳滑玉體想仙裝少陵為爾東閣美豔激詩腸當巳陰未雨容光無心賦海棠又淺淺池塘深深庭院復出短短垣牆年年為爾若九真巡㑹寶惜流芳向人自有綿眇無言深意深藏傾國傾城天教與抵死芳香裊鬢金色輕危欲壓綽約冠中央蒂團紅蠟蘭肌粉豔巧能妝嬋娟一種風流如雪如氷衣霓裳永日依倚春風笑海棠滿庭芳李西美白玉肌膚清氷神彩仙妃何事煙村自然標韻羞入百花羣不意盈盈瘦質犯寒臘獨作春溫溪橋外斜枝半吐行客一銷魂清香無處著雪中暗認月下空聞算誰許幽人相伴芳尊莫放高樓弄笛忍教看雪落紛紛堪調鼎濛濛煙雨滋養待和羮又一種江梅偷傳春信夜來先綻南枝嫩苞寒蕚妝㸃綴胭脂雪裏渾迷素質明月下惟有香肌山村路人家舍窄低亞水邊籬偏宜壽陽女新妝淡淡粉靣曽施更悲笳急管塞曲爭吹陌上行人暫聽香風暗都入愁眉音書杳天涯望斷折寄擬慿誰又李易安小閣藏春閒窗鎖晝畫堂無限深幽篆香燒盡日影下簾鉤手種江梅更好又何必臨水登樓無人到寂寥渾似何遜在揚州從來知韻勝難堪雨藉不耐風柔更誰家橫笛吹動儂愁莫恨香銷雪減須信道掃迹情留難言處良宵淡月踈影尚風流又墨梅周忘機脂澤休施鉛華不御自然林下真風欲窺餘韻何處問仙踪路壓橫橋夜雪看暗淡殘月朦朧無言處丹青莫擬誰寄染毫工遙通塵外信寒生墨暈依約形容似疏疏斜影蘸水搖空收入雲窗霧箔春不老芳意無窮梨花雨飄零盡也難入夢魂中又蠟梅園林蕭索亭臺寂靜萬木杳凍凋傷曉來初見一品蠟梅芳疑是黃酥㸃綴超羣卉獨占中央堪閒玩檀心紫蘂清雅噴幽香華堂歡㑹處陶陶共醉相勸瑶觴逞風流開早不畏嚴霜才子佳人屬意搜新句吟咏詩章歌筵罷醺醺歸去蟾影照回廊黃鶯兒王晉卿多情春意憶時節北圃人來傳道江梅依稀芳姿數枝新發誇嫩臉著胭脂膩滑凝香雪問伊還記年時正好相看因甚輕别情切往事散浮雲舊恨成華髮早知空對綺檻雕欄孜孜望人攀折愁未見苦思量待見重端疊願與永倣高唐雲雨芳菲月又香梢勻蘂先回暖㸃㸃胭脂輕襯紅芭隱映疏篁紅翠相間方瑞雪乍晴時愛日初添線五雲樓上遙看似覩溪邊仙子妝靣堪羡影轉玉枝斜豔拂朝霞淺就中妖嬈獨得芬芳偏教容易瓊苑開又報一陽時不似鶯聲喚肯與梅臉爭春靚笑羣芳晚錦堂春雪梅臘雪初晴氷銷凝泮尋幽閒賞名園時向長亭登眺倚遍朱䦨拂靣嚴風凍薄滿階前霜葉聲乾見小臺深處數㸃江梅漏泄春權百花休恨開晚奈韶華瞬息常放教先非是東君私語和煦恩偏欲寄江南音耗念故人隔闊雲煙一枝贈春色待把金刀翦倩人傳瑶臺月嚴風凛冽萬木凍園林肅靜如洗寒梅占早爭先暗吐香蘂逞素容探暖欺寒遍妝㸃亭臺佳致通一氣超羣卉值臘後雪清麗開筵共賞南枝宴㑹好折贈東君驛使把嶺頭信息逺寄遇詩朋酒侣尊前吟綴且優遊對景歡娛更莫厭陶陶沈醉羌管怨瓊花綴結子用調鼎餌將軍止渴思得此味玉梅香慢寒色猶高春力尚怯微律光催梅折曉日輕烘清風額觸疑散數枝殘雪嫩英妒粉嗟素艷有蜂蝶全似人人向我依然頓成離缺裴回寸腸萬結又因花暗成凝咽撚蘂憐香不禁恨深難絶若是芳心解語應共把此情細細說淚滿䦨干無言强折雙頭蓮觸目庭臺當嵗晚凋殘恁時方見瓊英細蘂似美玉碾就輕氷裁翦暗想蜂蝶不知有清香為援深疑是傅粉酡顔何殊壽陽妝面惟恐易落難留仗何人巧把名詞褒羡狂風橫雨枉墜落細蘂紛紛千片異日結實成陰託稱殊非淺調鼎鼐試作和羮佳名方顯夏雲峰瓊結苞酥凝蘂粉心輕㸃胭脂疑是素娥妝罷玉翠低垂化工深意巧付與别箇標儀怎奈向風寒景裏獨是開時緣何不與春期此花又豈肯爭競芳菲疑雨恨煙忍見嶺畔江湄冷煙幽豔曽不許霜雪相欺只恐向笛聲怨處吹落殘枝慶清朝北陸嚴凝東郊料峭化工爭付歸期前村夜來雪裏先見纎枝想像靚妝淡竚叉頭翡翠繭蛾兒氷壺瑩坐間靜對姑射仙姿瀟灑處非豔冶最竒是名賦處士新詩尊前坐曲忍聽羌管頻吹試問占先衆卉微笑不奈苦寒欺何須問定應未羡桃李芳菲燭影搖紅㸃㸃飛香見梅知道春心透怕寒不捲玉樓簾羞與花同瘦手撚青枝頻嗅誚冷落薔薇金斗翻驚緑鬢不似芳姿年年依舊才被凝酥滿園桃李看看又江南幽夢了無㾗啼暈殘襟袖鴛被有誰溫繡初怎敢更十分殢酒伴君獨自幾個黃昏月明時候鳯凰臺上憶吹簫權無染水國雲鄉氷魂雪魄朝來新領春還便未怕天暄蜂蝶笛轉羌蠻一樹垂雲似畫香暗暗白淺紅班東風外清新雪月瀟灑溪山應是飛瓊弄玉天不管年年謫向人間占芳事鉛華一洗紅葉俱殘多少煙愁雨恨空脈脈意逺情閒無人見翠袖倚竹天寒又紅菩珠圓素蕤玉淨南荒巳報春還便迤邐雲開五嶺雪霽羣蠻喜見東君信息應不管潘鬢新班慿誰寄心縈秋水目斷春山長記小橋斜度瀟灑處葦籬茅舍三間肯伴我風光賞遍月影疑殘好為調羮結子玉鉉冷金鼎空閒北枝畔誰念嶰律猶寒東風第一枝臘雪猶凝東風遞暖江南梅早先折一枝經曉芬芳幾處漏春信息孤根寒豔料化工别施恩力迥不與桃李爭妍自稱壽陽妝飾雪爛漫怨蝶未知嗟燕孤畫樓綺陌暗香空寫銀箋素豔謾傳妙茟王孫輕顧便好與移栽京國更免逐羌管凋零冷落暮山寒驛又溪側風回前村霧散寒梅一枝初綻雪豔凝酥冰肌瑩玉嫩條細軟歌臺舞榭似萬斛珠璣飄散異衆芳獨占東風第一㸃裝瓊苑青蕚㸃絳脣疏影瀟灑噴紫檀龍麝也知青女嬌羞壽陽懶勻粉面江梅臘盡武陵人應知春晚最苦是皎月臨風畫樓一聲羌管晝夜樂一陽生後風光好百花瘁羣木槁南枝探暖欺寒嘉卉爭先占早曉來風送清香杳映園林報春來到素豔自超羣似姑射容貌畫堂開宴邀朋友賞瓊英同歡笑隴頭寄信丁寧樓上新妝鬭巧對景乘興傾芳酒拚沈醉玉山頻倒結實用和羮是真竒國寶落梅風按花草粹編共二闋此失一王晉卿壽陽妝晚慵勻素臉經宵醉㾗堪惜前村雪裏幾枝初綻出氷姿仙格忍被東風亂飄滿地殘英堆積可堪江上起離愁慿誰說寄腸斷未歸客流恨聲傳羌笛感行人水亭山驛越溪信阻仙鄉路杳但風流塵跡香豔濃時東君吟賞巳成輕擲願身長健且憑䦨明年還放春消息玉燭新李易安溪源新臘後見幾朵江梅裁翦初就暈酥砌玉芳英嫩故把春心輕漏前村昨夜想弄月黃昏時候孤岸悄疏影橫斜濃香暗沾襟袖尊前賦與多才問嶺外風光故人知否壽陽謾鬭終不似照水一枝清瘦風嬌雨秀好插繁華盈首須信羌笛無情看看又奏憶黃梅王逐客枝上葉兒未展已有墜紅千片春意怎生防怎不怨被我安排遍牙牀斗帳和嬌豔移在花叢裏靣請君看惹清香偎媚暖愛香愛暖金杯滿問春怎管大家拚便做東風總吹交零亂猶肯自輸我鴛鴦一半柳初新千林凋謝嚴凝日青帝許梅花折孤根回暖前村雪裏昨夜一枝凝白天匠與雕瓊鏤玉淡然非人間標格别有神仙第宅繡簾垂碧紗窗隔月明風送清香苒苒著摸美人詞客向曉來芳苞乍摘對菱花倍添姿色梅苑卷三
