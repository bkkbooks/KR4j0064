body:
  text: 梅苑巻七宋黄大輿編菩薩蠻晁次膺百花未報芳菲信一枝探得春風近只與雪争光更無花比香孤標天付與冷豔誰能顧庭院好深藏莫教開路傍又天威亂糝瓊蕤密一光吞盡千山碧梅與雪争妍孤香風暗傳玉骨從來痩不奈春僝僽𦍑管一聲殘水鄉生暮寒又黄昏月暗清溪色簾垂小閣霜華白一色玉玲瓏横斜水月中小行孤影動生怕驚花夣半夜得春歸屏山人未歸又空定寺賞梅毛澤民含章簷下眉如月融酥和粉描疎雪桃杏莫争春凌風臺畔人如今千萬樹零落孤村雨和淚滴瑶觴歸時肌肉香又回文嶠南江淺紅梅小小梅紅淺江南嶠窺我向疎籬籬疎向我窺老人行即到到即行人老離别惜殘枝枝殘惜别離又雙松菴月下賞梅李方叔城陰猶有松間雪松間暗淡城頭月月下㡬枝梅爲誰今夜開尊前簪素髪自擁繁枝折疑是在瑶臺寶燈攜手來又江南未雪梅先白憶梅人是江南客猶記舊相逄淡煙微月中春風長有信消息歸來近懐逺上樓時晩雲和鴈低又霜天不管青山痩輕雲淺拂修眉皺煙樹隔瀟湘隔㠶吹異香影殘春恨小淡墨欹斜倒無處著消愁笛寒人倚樓又題梅扇周忘機梅花韻似才人面爲伊寫在春風扇人面似花妍花應不解言在手微風動勾引相思夢莫用插酴醿酴醿羞見伊又蠟梅李士舉薫沈刻蠟工夫巧蜜脾鎖碎金鐘小别是一般香解教人斷腸氷霜相與痩清在江梅否念我忍寒來憐君特地開木蘭花十梅未開莫少虚一枝和露珍珠貫月下回來㝷幾遍今朝忽見數枝開未有十分如待伴新妝不比徐妃面雪豔氷姿寒欲顫外邊多少掃春人春信莫教容易斷晨景梅邊曉景清無比林下詩人呵凍指玉龍留住麝臍煙銀漏滴殘龍腦水晨光漸漸収寒氣昨夜遺簪猶在地好生折贈鏡中人只恐緑窓慵未起雪裏清姿自是生寒痩更在春前并臘後誰教六出巧遮藏争似一番先透漏謝娘莫把翻衣袖無限瓊英飄玉逗開時朶朶見天真可奈碧溪和粉溜晴天寒梢雨裏愁無那林下開時宜數過夕陽恰似過清溪一樹横斜疎影卧朱唇莫比桃花破鬢裊黄金花欲墮賸看春雪滿空來觸處是花㝷那箇風前㝷梅莫背東風路路在花前知去處真香破鼻驀然聞試問幽事知㡬歩多情更被無寒助萬物枯時神物護一枝和雪倚䦨干昨夜初開春信度月下暗香浮動黄昏後更是月明如白晝看來都坐玉壺氷折贈徐妃丹桂手賞酬風景無過酒對影成三誰左右勸君携取董妖嬈拱得醉翁香滿袖雨中花時人道多風雨梅蘂都來無㡬許何須飄灑濕芳心粉面琳琅如淚注家童莫掃花陰土留浥瓊林枝上露若教燕子早銜泥徑裏餘香應滿户欲謝眼前欲盡情何限風外南枝無一半東君何事莫教開及至如今都不管高樓三弄休吹趲一片驚人腸欲斷杏花開後莫嫌衰如豆青時君細看望梅少陵長被花爲惱况是梅花非草草臨岐争奈不吟詩此度詩人宜可老詩成莫惜尊罍倒不醉花前花解笑醒時分付両三枝酒後憶君清夢到南鄉子大卿榮諲江上野梅芳粉色盈盈照路傍閒折一枝和雪嗅思量似箇人人玉體香特地起愁腸此恨誰人與寄將山館寂寥天欲暮凄凉人轉迢迢路轉長又梅蘂露鮮妍雪態氷姿巧耐寒南北枝頭香不斷堪觀露浥瓊苞粉未乾盡手寫應難横管休吹恐易殘留得佳人臨曉際凭欄試把新妝比竝看又把酒對江梅箇是花中第一枝氷雪肌膚瀟灑態須知姑射仙人正似伊東閣賦新詩慙愧當年杜拾遺月裏何人横玉笛休吹正是芳梢著子時又蘇東坡寒雀滿踈籬争抱寒柯看玉蕤忽見客來花下坐驚飛踏散芳英落酒巵痛飲又能詩坐客無氊醉不知花謝酒䦨春到也離離一㸃微酸巳著枝又莫作俗花看珠有清香雪太寒擬把千鍾酬國豔林間醉倒猶嫌酒量慳欲去更重攀送盡斜陽未忍還争得重城休上鏁留連借取氷輪照玉顔又醉撚一枝春此意誰人㑹得君嫩白輕紅纔入手盈盈一似前時酒半醺心眼兩相親絶代風流惱殺人粉蝶霜禽休悵望叮嚀只要揚州作主盟又欄檻對幽堂翠葉枝頭萬朶霜檀口乍開龍麝噴非常體勝佳人異骨香花與月争光偏引蜂兒戲遶牆不與羣英争豔麗芬芳奚落東君只淡妝又凛冽苦寒時萬木凋枯力漸衰昨夜前村深雪裏春回庾嶺南枝綻早梅映月與清輝驛使加鞭喜探迴風送馨香來小院芳時料想羣花尚未知又催梅把酒祝江梅春到南枝早早開人在隴頭凝望久裵回驛使如今尚未來寄語莫相催直待東風細翦裁只恐未能傳信息妝臺先要飛來襯粉腮握金釵梅蘂破初寒春來何太早輕傅粉向人先笑比竝年時較些少愁底事十分清痩了影静野塘空香寒霜月曉風韻減酒醒花老可殺多情要人道疎竹外一枝斜更好人月圓園林巳有春消息㝷待嶺頭梅一枝清淡疎疎帯雪昨夜初開芳心㡬㸃東風多少先爲傳來不随紅紫紛紛閙閙蝶妒蜂猜一斛珠寒氷初泮嶺頭一朶香苞綻菡蓞如畫真堪羡休逞随風柳絮垂金線月宫毎嫖開較曉壽陽又喜勻妝面更聞何處鳴𦍑管一曲一聲惹起神撩亂解珮令或作許冲元蕙蘭無韻桃李堪埽都不數凡花閒草對月臨風長是伊故來相惱和魂夢披他香到江頭隴畔争先占早一枝枝看來縂好似恁風標待發願春前祈禱祝東君放教不老醉花陰趙女獻梅舒信道月愰風簾香一陣正千山雪盡冷對酒尊傍無語含情别是江南信壽陽妝罷人微困更玉釵斜襯插一枝歸只恐風流羞上潘郎鬢又粉妝一捻和香聚教露華休妒今日在尊前只爲情多脈脈都無語西湖雪過留難住指廣寒歸去去後又明年人在江南夢到花開處又霓裳淺豔來何處不是閒雲雨雪苑舊精神燕席吟窓昨夜生輕素闌珊豈是東風妒惜暗香分付香在玉清宫不惹年華只帯春寒去掃地舞酥㸃蕚玉碾蕚㸃時碾時香雪薄才折得春方弱半掩朱扉垂繡幕怕吹落撚一餉嗅一餉撚時嗅時宿酒忘春争上不忍放待對菱花斜插向寶釵上玉樓人去年㝷處曽持酒還是向南枝見後宜霜宜雪精神沒些兒風味減舊先春似與羣芳鬭暗度香不待頻嗅有人笑折歸來玉纎長儘露羅䄂燕歸梁月裏雲裝冷豔裁獨秀在巖隈雪中昨夜一枝開探春色嵗前來清香折得多情寄與人向隴頭回憑君移取近瑶臺伴桃李日邊栽憶人人密傳春信微妝曉景淡竚香苞欲綻臨風雖未吐芳心奈暗露盈盈粉面何人月下一聲長笛即是飛英凌亂憑䦨無惜賞芳姿更莫待傾筐巳滿又前村深雪難㝷幽豔無奈清香漏綻煙梢霜蕚出牆時似暗妒壽陽妝面幽香浮動無縁攀賞但只心勞魂亂不辭他日醉瓊姿又只恐陰成子滿採桑子花中獨占春風早長愛江梅香豔清杯芳意先愁調角催㝷香巳落閒人後此恨難裁更曉須來却恐初開勝未開又何文縝百花叢裏花君子取信東君取信東君名䇿花中第一勛結成寶鼎和羮味多謝東君多謝東君香遍還應號令春又陽和欲報春來也先上南枝桃李休疑折徧香梢人未知黄昏小院誰攀折疎影斜欹半掩朱扉旋嗅清香月下歸又江南春信梅先賦休道春遅映竹開時姑射仙人雪作肌青樓且莫吹𦍑管留勸金巵折取高枝香滿名園蝶未知又南枝淡竚無妖豔蠟蘂羞黄争似紅妝不假施朱弄曉光雪融日暖瓊肌膩酒暈生香桃臉相當尤笑桃花混衆芳又幽芳瑩白前村裏豈藉春工勝盡羣紅瓊撚凝酥向不同一聲𦍑管愁人處片片西東覩此遺踪不怨狂風怨馬融又肌膚綽約真仙子來伴氷霜洗盡鉛黄浄面初無一㸃妝裏㝷花不用吹銀燭暗裏聞香零落池塘分付餘妍與壽陽又東君有意觀羣卉故放争先帯露含煙對月偏宜映水邊瓊苞素蘂胭脂淡雪後風前堪賞堪憐曽與歌樓佐管絃又羣芳盡老園林燼獨有寒梅探得春回昨夜前村一朶開輕盈雪裏孤根秀膩臉香腮𦍑管休催留取瓊葩佐酒杯又霜風漏泄春消息折破孤芳野興傍徨姑射神仙觸處藏新妝不假施朱粉雪月交光欲贈東皇冷淡龍涎㸃㸃香又煙籠淡月寒宵永悄悄簾櫳微度香風㡬㸃梅開小院中擁衾欹枕難成寐蕭寺初鐘鴈響遥空家在青山千萬重又再雪中飛瓊欲赴瑶臺宴先具威儀雲駕霓衣從者皆騎白鳯飛人間盡變爲銀海此景偏竒姑射氷姿昨夜前村見一枝又蠟梅鎔金脫得花鈿小㸃綴瓊枝月淡風微露浥香肌自是竒玉人呵手昻頭翦纎鬢邊垂似簇蜂兒春入芳容不肯飛㝷梅今年早覺花信蹉想芳心未應悞我一日小徑㡬回過始朝來㝷見雪㾗微破眼前大抵情無那好景色只消些箇春風爛漫都且可是而今枝上一朶兩朶又幽香淺淺濕未透認雪底思來始有翦裁尚覺瓊瑶皺苦寒中越恁骨清肌痩東風氣象園林舊又今年而今時候急宜小摘當尊酒選一枝且付玉人纎手鞓紅粉香尤嫩霜寒可慣怎奈向春心巳轉玉容别是一般閒婉悄不管桃紅杏淺月影玲瓏金隄波面漸細細香風滿院一枝折寄故人雖逺莫輒使江南信斷武陵春昨夜前村深雪裏春信爲誰傳風送清香滿座間不用熱沈檀竹外一枝斜更好偏稱玉人攀休放遊蜂去又還嫌怕損芳顔菩薩蠻趙德麟春風試手梅先蘂氷姿冷豔明沙水不受衆芽知端須月與期清香閒自逺先向釵頭見雪後宴瑶池人間第一枝梅苑巻七
