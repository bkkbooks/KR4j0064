body:
  text: 梅苑卷八宋黃大輿編瑞鷓鴣闕臨鸞常恁整妝梅枝枝仙豔月中開可殺天心故與多端麗那更羅衣峭窄裁幾回瞻覻魂消黯芙蕖勻透雙腮好將心事都分付與時暫到小庭來玉砌紅芳點緑苔又柳耆卿天將竒豔與寒梅乍驚繁香臘前開暗想花神巧作江南信解染胭脂細翦裁壽陽妝罷無端飲凌晨酒入香腮恨聽煙鴻深中誰恁吹羌管逐風來瑞雪紛紛落翠苔又晏同叔江南殘臘欲歸時有梅紅亞雪中枝一夜前村聞道瑶英拆端的千花冷未知丹青改樣勻朱粉雕梁欲畫猶疑何妨與向冬深密種秦人路夾仙溪不待夭桃客自迷又越娥紅淚染朝雲越梅從此學妖頻臘月初開庾嶺繁開後時染妍華贈世人前村昨夜深深雪朱顔不及天真何時驛使西來寄與相思客一枝新報道江南别樣春又林逋詩句衆芳搖落獨鮮妍占盡風情向小園疏影橫斜水清淺暗香浮動月黃昏寒禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金尊又岸梅崔魯詩句含情含態一枝枝斜壓漁家短短籬惹袖尚餘香半日向人如訴雨多時初開偏稱雕梁畫未落先愁玉笛吹行客見時無意去解帆煙浦為題詩又周忘機一䀶月色挂簾櫳梅影斜斜小院中狂醉有心窺粉面夢魂無處避香風愁來夢楚三千里人在巫山十二重咫尺藍橋無處問玉簫聲斷楚山空又蠟梅漢宫鉛粉淨無䀶蠟點寒梢水畔村愁犯氷霜欺竹柏肯同雲月弔蘭蓀騷人詠去清詩健驛使傳來舊興存病眼渾疑春思早一枝聊洗畫圖昏又蠟點梅花柳未回青蘭未芽誰知此物在君家緑窗借得先春手黃蠟吹成耐凍花衣麝暗薰香髣佛山蜂誤認影橫斜憑君説與徐熙道翰墨從今不足誇一落索臘後東風微透越梅時候一枝芳信到江南來報先春秀宿醉頻拈輕嗅堪醒殘酒笛聲容易莫相催留待纖纖手鬢邊華小梅香細豔淺過楚岸尊前偶見憂間淡天與精神掠青鬢開人醉眼如今拋擲經春恨不見芳枝寄逺向心上誰解相思賴長對妝樓粉面御階行平生有箇風流願願長與梅為伴問伊因甚破寒來只恐百花先綻比蘭比麝比酥比玉休恁間撩亂瑶臺月下分明見依舊殘妝淺不知分得幾多香一片清如一片直須遮斷恐人眼毒不解輕輕看西江月蘇東坡玉骨那愁瘴霧氷肌自有仙風海仙時遣探芳叢倒挂緑毛么鳯素靣常嫌粉汚洗妝不褪脣紅高情巳墜曉雲空不與梨花同夢又紅梅王介甫梅好惟嫌淡佇天教薄與胭脂真妃初出華清池酒入瓊姬半醉東閣詩情易動高樓玉管休吹北人渾作杏花疑惟有青枝不似又杜安道曉鏡初妝玉粉輕風暗遞幽香間隨月影到寒塘忘却人間天上雪意空驚春意孤芳巳斷年芳從教驛使為伊忙乞箇壽陽宫樣又北嶺天饒瑞雪南枝地殷紅苞朦朧霽月映寒梢誰把玉人紗罩香勝爐薰龍麝竒過庭擁瓊瑶一杯清酒願相招慰我茅堂清瘦又墨梅洪覺範入骨風流國色透塵往往真香為誰風鬢涴啼妝半樹水村春漾雪壓枝低籬落月高影動池塘高情數筆寄微茫小寢初開霧帳又翡翠枝頭晚蕚嬋娟月裏飄香春蘭秋蕙作尋常不與夭桃朋黨笑見深紅淺白從教蝶舞蜂忙風流標致道家妝瀟灑得來别樣又蠟梅黃蠟誰將點綴紅膏不許施妝孤根來自水雲鄉風味天然醖釀看取玉奴呵手摘來珠露霑裳翠鬟斜插一枝香似簇蜂兒頭上又萬木經霜凍折孤根獨報春來前村雪裏一枝開將緩月華光彩一點脣紅不褪妝如傅粉皚皚和羮端的稟天才終入庖人鼎鼐蝶戀花晏同叔千葉梅花誇百媚笑面凌寒內樣妝先試月臉氷肌香細膩風前偏稱東君意一捻年光春有味江北江南更有誰相似橫玉聲中吹滿地好枝長恨無人寄又别席探題舒信道雪後江城紅日晚暖入香梢漸覺玲瓏滿髣佛臨風妝半面水簾斜捲誰庭院折向樽前仔細看便是江南寄我人還逺手把北枝多少怨小樓橫笛休腸斷又寒秀亭觀梅毛澤民想見江南情不少爾許多時怪得無消耗淡日暖雲勾引到闌干寂寞憐春小宫面可忺勻畫了粉瘦酥寒一段天真好喚起玉兒嬌睡覺半窗殘月南枝曉又石耆翁半夜六龍飛海嶠滉漾鼇波露出珊瑚小玉粉枝頭春意早東風未緑瀛州草姑射仙人真窈窕淨練明妝如伴商巖老夢入水雲間縹眇一樓明月千山曉又暖發黃宫和氣軟雪裏精神巧惜東君翦嫩蘂商量春色淺青枝疑是香酥濺誰道和羮芳信逺點點微酸巳向枝頭見休待玉英飛四散且移疏影橫金盞又青玉枝頭紅蕾吐粉頰愁寒濃與胭脂傅辨杏猜桃早莫誤夭姿不到風流處雲破月來花上住要共佳人弄影參差舞只有暗香穿繡户韶華一曲驚飛去又蠟梅王履道翦蠟成梅無著意黃色濃濃對蕚勻妝綴百和薰肌香旖旎仙裳應灑薔薇水雪徑相逄人半醉手折低枝擁結雲爭翠道韞撚枝無限思玉真未灑梨花淚又墨梅碧瓦籠晴香霧繞呵手西偏小駐聞啼鳥風度女牆吹語笑南枝破臘應開了道骨不凡瘴江曉春色通靈醫得花重少抱暖釀寒春杳杳一聲畫角光殘照桃源憶故人園林萬木凋零盡惟是寒梅香噴不許雪霜欺損逈有天然性南枝漸吐紅苞嫩冠絶夭桃繁杏不記故人音信對景成離恨又王逸民劉郎自是桃花主不許春風困度春色易隨風去片片傷春暮返魂不用清香炷却有玉梅淡佇從此鎮長相顧不怨飄殘雨又江天雪意雲飛重却倚闌干初凍回傍小樓獨擁盡日無人共牆梅未落春先縱欲寄一枝誰送月夜暗香浮動似作離人夢又蠟梅南枝向暖清香噴誰付騷人詞詠一種隴頭春信不借胭脂暈梢頭誰把輕黃揾渾似不忺施粉疑是壽陽孤冷染得相思病又寒苞初吐黃金瑩色染薔薇猶嫩枝上紫檀香噴灑落饒風韻南枝一種同春信何事不忺朱粉自稱霓裳孤冷怨感宫腰恨攤破浣溪紗白梅雪態氷姿好似伊料應嘗笑水仙遲驛使初傳芳信早賞佳期暗想花神多巧妙黏酥綴玉壓纖枝粉靣臨鸞宜月殿整妝時又紅梅誰染深林酥綴來意濃含笑笑顔開誤認浣溪人飲罷上香腮辨杏疑桃稱好句名園色異占多才折得一枝斜插鬢墜金叉又重心取次勻妝玉有䀶參差玉軟淡精神姑射重綃風捲亂喜相迎蝶戲飛層雙趐重清中冨貴最多情全似壽陽當日事點殘英又蠟梅蜜室蜂房别有香臘前偏會泄春光凝佇清容何所似笑姚黃蠟注金鐘誠得意風飄氣味壓羣芳不似壽陽誇粉面道家妝憶王孫莫少虛絳唇初點粉紅新鳯鏡臨妝巳逼真苒苒叉頭香趂人惜芳晨玉骨氷姿别是春又史逺道牆頭梅蘂一枝新宋玉東鄰算未真折與氷姿綽約人怯霜晨桃李紛紛不當春玉交枝膽樣瓶兒幾點春翦來猶帶水雲䀶且移孤冷相伴最深尊每為惜花無曉夜教人甚處不銷魂為君惆悵獨自倚黃昏又房舜卿蕙死蘭枯待返魂暗香梅上又重聞粉妝額子多少畫難真竹外氷清斜倒影江頭雪裏暗藏春千鍾玉酒休更待飄零又蠟梅蕙子蘭孫小樣兒化工簇就寄南枝笑他蘭蕙雖韻帶輕肥香靄紫檀和霧重色攢黃蠟界金徽有人瀟灑插向鬢邊宜又誰道花房採蜜脾翦成黃蠟小花兒惡嫌朱粉不肯肖青枝檀吐暗香蘭許韻月移芳影雪生肌不妨花蘂羌笛儘教吹玉樓春空定寺賞梅毛澤民蘂珠宫裏三千女摘粉為春塵不住月華冷處欲迎人七里香風先滿路一枝誰寄南安去想得韶光能幾許醉翁滿眼玉玲瓏直到煙空雲盡處又迢遞前村深雪裏望斷行雲香細細笛中宮裏慕芳姿怨曲啼妝長見淚不會同心榮落易冷豔翻隨分嶺水有誰曽念隴頭人逺寄江南春日意又靚妝才學春無價腮粉額黃宫樣畫妖嬈間倚曲闌邊孤淨不勝微月下牽情羣蘂臨風亞惜恐蒼苔和雨借何如相傍玉樓人芳酒繡筵紅燭夜又蕭蕭海上風長起也有梅花開玉蘂愛君風措瑩如冰伴我情懷清似水詩人縱復工難擬莫把間花容易比濃香吹盡不須愁細雨微風催結子又李易安紅酥肯放瓊苞碎探著南枝開遍未不知藴藉幾多香但見包藏無限意道人憔悴春窗底悶損闌干愁不倚要來小酌便來休未必明朝風不起又蠟梅臘前先報東君信清似龍涎香得潤黃輕不肯整齊開比著紅梅仍舊韻纖枝瘦緑天生嫩可惜輕寒摧挫損劉郎只解誤桃花悵恨今年春又盡小桃紅今見珠玉詞後園春早殘臘朦煙草數樹寒梅欲綻香英小妹無端折盡叉頭朵滿把金尊細細傾憶得往年同伴沈吟無限情懊惱東風莫便吹零落惜取芳菲眼下明搗練子欺萬木怯寒時倚欄初認月宫姬拭新妝披素衣孤標韻暗香奇氷容玉豔綴瓊枝借陽和天付伊喜團圓輕攢碎玉玲瓏竹外脫去繁華殢東君先點破壓羣花瘦影生香黃昏月館清淺溪沙仙標淡佇偏宜么鳯肯帶棲鴉楊柳枝朝無咎素色清薰出俗華臘前花軒前愛日掃雲遮幾枝斜月淡紗窗香暗透白於紗幽人獨酌對芳葩興無涯愁倚欄氷肌玉骨精神不風塵昨夜窗前都折盡忽疑君清淚拂拂沾巾誰相念折贈芳春羌管休吹别塞曲有人聽梅苑卷八
