body:
  text: 梅苑詞曲類二詞選之屬提要臣等謹案梅苑十卷宋黃大輿編大輿字載萬錢曽讀書敏求記引王灼之語云字載方殆書萬為万又訛万為方如蕭方等之轉為萬等歟其爵里未詳厲鶚宋詩紀事稱為蜀人亦以原序自署岷山耦耕及成都文類載其詩以意推之耳無確證也王灼稱大輿歌辭與唐名輩相角其樂府號廣變風有賦梅花數曲亦自奇特然樂府今不傳惟此集僅存所録皆詠梅之辭起于唐代止于南北宋間自序稱已酉之冬抱疾山陽三徑掃迹所居齋前更植梅一株晦朔未周略已粲然於是録唐以來才士之作以為齋居之玩命之曰梅苑考已酉為建炎二年正髙宗航海之嵗山陽又戰伐之衝不知大輿何以獨得蕭間編輯是集殆已酉字有誤乎昔屈宋遍陳香草獨不及梅六代及唐篇什亦寥寥可數自宋人始絶重此花人人吟詠方回撰瀛奎律髓於著題之外别出梅花一類不使溷於羣芳大輿此集亦是志也雖一題裒至數百闋或不免窠臼相因而刻畫形容亦往往各出新意固倚聲者之所採擇也集中兼采蠟梅蓋二花别種同時義可附見至九卷兼及楊梅則務博之失不自知其泛濫矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀梅苑序自瓊林琪樹瑶華緑蕚之異不列於人間目所常玩如豫東園之梅可以首衆芳矣若夫呈妍月夕奪霜雪之鮮吐嗅風晨聚椒蘭之酷情涯殆絶鑒賞斯在莫不抽毫遣滯劈綵舒聚召楚雲以興歌命燕玉以按節然則妝臺之篇賔筵之章可得而述焉已酉之冬豫抱疾山陽三徑掃迹所居齋前更植梅一株晦朔未逾略巳粲然於是録唐以來詞人才士之作以為齋居之玩目之曰梅苑者詩人之義託物取興屈原製騷盛列芳草今之所録蓋同一揆聊書卷目以貽好事云岷山藕耕黃大輿載萬序
