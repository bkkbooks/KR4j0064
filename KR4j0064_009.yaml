body:
  text: 梅苑巻九宋黄大輿編減字木蘭花歐陽永叔去年殘臘曽折梅花相對插人面而今空有花開無處㝷夭夭不逺把酒拈花須發願願得和伊偎雪眠香似舊時又庭梅初綻風遞幽香清更逺别有孤根不待陽和一㸃恩雪中風韻皓質氷姿真瑩静月下精神來到窗前疑是君又前村夜半毎爲江梅腸欲斷淺紫深紅惟信漫天雪裏逄醉頭扶起宿酒䦨干猶困倚便莫催殘明日東風爲掃看又踈梅風韻不許遊蜂飛蝶近要識芳容除向瑶臺月下逄尊前一見換盡平生桃李眼却笑襄王楚夢無蹤空斷腸又山城驛近又報寒梅傳驛信逺水孤村月下何人與斷魂幽芳在手花木無情那得痩似此天真好贈東陽姓沈人又張文潛箇人風味只有江梅些子似毎到開時滿眼清愁只自知霞裾仙珮姑射神仙風露態蜂蝶休忙不與春風一㸃香又香肌清痩淚濕輕紅踈雨後笑靨微開宿雨微醺越女腮多情無奈玉管休吹簾影外薄晩池臺惆悵繁華夢裏來又東君有待留得一枝香雪在晚日融融只恐輕酥暖漸鎔歌催管送芳酒一尊誰與共寂寞牆東瀟灑黄昏滿院風又蠟梅鵞黄初吐無數蜂兒飛不去别有香風不與南枝鬭淺紅憑誰折取擬把玉人分付與碧玉搔頭淡淡霓裳人倚樓又園林衰槁一品梅花開太早紫蘂檀心獨占中央色似金幽香清逺對景開尊同賞翫雅稱仙姿莫是多情染相思臨江仙曽夫人子宣妻庭院深深深㡬許雲窗霧閣春遲爲誰憔悴損芳姿夜來清夢好應是發南枝玉痩檀輕無限恨南樓𦍑管休吹儂香吹盡有誰知暖風遲日也别到杏花肥又漏出春光三四朶氷肌玉骨偏宜乍開應笑百花遲將軍曽止渇畫角巳先知素豔不容蜂蝶採清香自有人知而今雖被雪霜欺和羮終待手金鼎自逄時又隴首雲収天色暮寒光射月初開崑荆山玉莫疑猜琳琅疑此地仙子不紅腮麗質霜裾真性雅餘香暗送人來亂将碎玉綴枝排雪中㝷不見青蕚辨竒才又葉少藴聞道今年春信旱梅花不怕餘寒憑君先向近南看香苞開也未莫待北枝殘腸斷隴頭他日恨江南㡬驛征鞍一杯聊與盡餘歡風情何似有老去未應閒又不與羣芳争絶豔化工自許寒梅一枝臨晚照歌臺眼明渾未見弦管莫驚催記取劉郎歸去路他年應話天台酒䦨不惜更重陪夜寒衣袂薄猶有暗香回又成都西園范夢龍試問前村深雪裏小梅未放雲英陽和先到錦官城南枝初破粉東閣有餘清人在高樓横怨管寄將隴客新聲西園下晚看飛瓊春風催結子金鼎待調羮又昨夜新陽回候館芳菲正滿霜林此時珍重重千金誰知紅粉豔還有嵗寒心風動霞衣香散漫酒醺丹臉深沈妖嬈偏稱美人簪一枝無處贈折得自孤吟又愛日新添春一線化工先到寒梅不隨桃李傍熈臺前村深雪裏昨夜一枝開姑射仙人標格韻凝妝粉謝香腮數家清弄笛聲哀愁人不怨聽自向枕邊來又玉貎香腮天賦與清姿不假鉛華素芳㝷在五陵家欲知春信息庾嶺一枝斜别有玲瓏瀟灑處月梢淡影籠遮休教𦍑笛一聲嗟宮妝猶未似留取意無涯踏莎行張尚書子功陽復寒根氣回枯桿前村昨夜梅初綻誰言造化沒偏頗半開何獨南枝暖素豔幽輕清香逺散雪中豈恨和羮晚不知何處誤東君至今不使春拘管又映竹幽妍臨池娟靚芳苞先暖香初娠南枝微弄雪精神東君早寄春音信奔月仙標乗煙逺韻玉臺粉㸃和酥凝從來清痩可禁寒爲誰早把霞衣損又正月十五日觀梅景伴氷簷情回瑶草甫能定得春來到管曽獨自索春憐而今覷著東風笑粉凝酥寒雲房睡覺胭脂也不添些少天真要與此花争是伊占得春光早又枝緑初勻蕚紅猶淺化工妝㸃年華晚暗香踈影水亭邊黄昏月下依稀見十二危樓誰人倚遍只愁𦍑笛聲幽怨少留情意待春來東君准擬長拘管又蕚破前村枝横江路鐵心應也頻凝竚怕愁惟恐不禁愁寕教雪月相分付不測春來難追香去無人知我心先誤多情縂道是東君東君也有無情處又㸃㸃瓊酥初寒乍結看來未忍輕輕折園林正告久蕭條春工著意饒先發眼底不凡枝頭自别也知徹苦宜霜雪這般風味恁馨香怎教桃李能同節又王母池邊曽記舊識玉京仙苑新移得素娥青女好精神比看終是無顔色傳入漢宫偷擬妝飾壽陽空恁勞心力寒香都不爲春來莫將逺寄春消息又趙温之妖豔相偎清香交噴花王尤喜來親迎有如二女事唐虞羣芳休更誇相竝小雨資嬌輕風借潤天應知我憐孤韻莫驚嵗嵗有雙葩儀真自古風流郡又蠟梅毛澤民粟玉玲瓏甕酥浮動芳跗染得胭脂重風前蘭麝作香寒枝頭煙雪和春凍蜂翅初開蜜房香弄佳人寒睡愁如夢鵞黄衫子茜羅裙風流不與紅梅共漁家傲蕙死蘭枯籬菊槁返魂香入江南早竹外一枝斜更好誰解道只今惟有東坡老去嵗花前人醉倒酒醒花落嫌人掃人去不來春又到愁滿抱青山一帯連芳草又李易安雪裏巳知春信至寒梅㸃綴瓊枝膩香臉半開嬌旖旎當庭際玉人浴出新妝洗造化可能偏有意故教明月玲瓏地共賞金尊沈緑蟻莫辭醉此花不與羣花比又毛澤氏恰到小菴貪睡著不知風撼梅花落一㸃兒春吹去却香約略黄蜂猶抱紅酥蕚遶徧寒枝添寂寞却穿行逕隨孤鶴守定微官真箇錯從今莫從今莫負雲山約又雪㸃江梅纔可可梅心暗弄纖纖朶疑是月娥庭下過仙翹嚲雲衫密綴真珠顆玉斚金甌連臂坐芳辰莫把離魂挫一曲繡筵嬌婀娜情無那陽闗聲裏櫻桃破又梅影薛幾聖雪月照梅溪畔路幽姿背立無言語冷浸瘦枝清淺處香時度妝成處士横斜句渾似玉人常淡竚菱花相對成清楚誰解小圖先畫取天欲曙恐隨月色雲間去胡擣練小春花信雪中來隴上小梅先拆今嵗東君消息還自南枝得素衣洗盡九天香玉酒添成國色一自故園疎隔腸斷長相憶又小亭初破一枝梅惹起江南歸興遥想玉溪風景水漾横斜影異香直到醉鄉中醉後還因香醒好是玉容相竝人與花争瑩又夜來江上見寒梅自逞芳姸標格爲甚東風先拆分付春消息美人釵上玉尊前朶朶濃香堪惜誰把彩毫描得免恁輕抛擲定風波好睡慵開莫厭遲自憐氷臉不宜時偶作小紅桃杏色閒雅尚餘孤瘦雪霜姿休把閒心隨物態何事酒生微暈沁瑶肌詩老不知梅格在吟咏更看緑葉與青枝又又是春歸煙雨村一枝香雪度黄昏竹外雲低疎影亞瀟灑水清沙淺見天真瘦玉欺寒香不暖堪羡氷姿照夜月無㾗樓上笛聲休取取說與江南人逺易銷魂又一樹寒梅傍小溪夜來陡覺綻南枝冷豔氷姿金蘂淺堪羡凝明因與雪霜欺折贈美人臨寶鑑雲臉鬢邊斜插最相宜憑仗高樓頻祝付說與馬融𦍑管且停吹鵲踏枝南國寒輕山自碧庭際梅花先報春消息綺蕚玉英何忽摘真堪樹下陳瑶席旋嗅清香消酒力翦採無功粉筆争描得一曲新歡須共惜等閒零落隨𦍑笛又斜日平山寒巳薄雪過松梢猶有殘英落晚色際天天似幕一尊先與東風約邀得紅梅同宴樂酒面融春春滿纖纖蕚客意爲伊渾忘却歸船且傍花陰泊又故里山遥春靄碧爲想繁枝清夣何曽息縲帶霜英人不摘紛紛日暮飄茵席休抱離腸憑酒力只有輕紈依約應傳得白髪未歸空自惜柔腸寄盡平陽笛清平樂李易安年年雪裏常揷梅花醉挼盡梅花無好意贏得滿衣清淚今年海角天涯蕭蕭両鬢生華看取晚來風勢故應難看梅花又寒溪過雪梅蘂春前發照影弄姿香苒苒臨水一枝風月夢遊髣髴仙鄉緑窓曽見幽芳事往無人共說愁聞玉笛聲長春光好看看臘盡春回消息到江南早梅昨夜前村深雪裏一朶花開盈盈玉蘂如裁更風細清香暗來空使行人腸欲斷駐馬裵回殢人嬌後亭梅花開有感玉瘦香濃檀深雪散今年恨探梅較晚江樓楚館雲閒水逺清晝永凭䦨翠簾低捲坐上客來尊中酒滿歌聲共水流雲斷南枝可插便須頻翦莫直待西樓數聲𦍑管二色宮桃鏤玉香苞酥㸃蕚正萬木園林蕭索惟有一枝雪裏開江南有信憑誰托前年記賞登高閣歎年來舊歡如昨聽取樂天一句云花開處且須行樂河傳香苞素質天賦與傾城標格應是曉來暗傳東君消息把孤芳回暖律壽陽粉面増妝飾說與高樓休更吹𦍑笛花下醉賞留取時倚䦨干鬭清香添酒力七孃子清香浮動到黄昏向水邊疎影梅開盡溪邊畔清蘂有如淺杏一枝喜得東君信風吹只怕霜侵損更新來插向多情鬢壽陽妝鑑雪肌玉瑩嶺頭别微添粉憶少年疎疎整整斜斜淡淡盈盈脈脈徒憐暗香句笑梨花顔色羈馬蕭蕭行又急空回首水寒沙白天涯倦牢落忍一聲𦍑笛烏夜啼權無染洗浄鉛華汚玉顔自發輕紅無言雪月黄昏後别是箇丰容骨瘦難禁消瘦香䝉不竝芳穠與君高却花眼紅紫謾春風浪淘沙春色入横塘變盡淒凉青梢弄粉雪溪傍疑是化工偏著意欲試新妝玉蓓鎖春藏占斷寒芳他時鼎鼐不須忙洩漏清香方有思别是春光又雪裏暗香濃乍吐瓊英横斜踈影月明中學傅胭脂桃與杏虛廢春工素豔有誰同不竝夭紅應如褒姒笑時容絶勝梨花春帶雨旖旎春風又村左小溪傍粉黛宜芳寒添瀟灑冷添霜清瘦㡬枝堪入畫竹映苔牆疎影浸横塘月暗浮香當時㑹伴壽陽妝不似東君先倚檻洩漏春光又楊梅王逐客素手水晶盤壘起仙丸紅綃翦碎却成團逗得安排金粟遍何似雞冠味勝玉漿寒只被宜酸莫將荔子一般看色淡香消僝僽損才到長安梅苑巻九
