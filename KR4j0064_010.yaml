body:
  text: 梅苑巻十宋黄大輿編㸃絳脣洪覺範流水泠泠斷橋斜路梅枝亞雪花初下渾似江南畫白璧青錢欲買應無價歸來也風吹平野一㸃香隨馬又破蕚江梅逈然標格氷肌瑩暗香疎影月漲銀塘静折取一枝與插多情鬢臨鸞鏡粉容相並試問誰端正又煙淡黄昏小移疎影横斜去暗香微度㸃綴梢頭雨玉管休吹更要留春住人何處對花無語望斷江南路又㸃㸃江梅向疎籬處香風逗未容春透花亦知人瘦姑射山頭誰伴黄昏後君知否自然孤秀横玉休三奏又題雪中梅寶月春遇瑶池長空飛下殘英片素光圍練寒透笙歌院莫把壽陽妝信傳書箭掩香靣漢宫㝷遍月裏還相見又雪裏芳叢嶺頭還報東君信壽陽妝靚姑射氷肌瑩曲㟁横斜清淺波相應風不定暗香疎影占斷花中韻又萬木凋殘早梅獨占孤根暖前村雪滿昨夜南枝綻堪恨倚欄容易吹𦍑管飄瓊片翠蛾争選貼向桃花靣又昨夜寒梅一枝雪裏多風措幽香無數不與羣花語最是凝情月夜交光處誰爲主待須折取𦍑管休輕舉又春日芳心暗香偏向黄昏逗玉肌寒透抵死添清瘦影落横塘月淡人歸後君知否一枝先秀應向東君奏又賦雪歸來緑窗一夜霜風𦂳也知春信消息南枝近隐映斜陽玉暖香成陣西湖景繁英有恨只向東風盡虞美人清江一曲君應見昨夜潮頭淺不争落落鬭竒竒看取水邊寒蘂雪邊枝日斜疎影還欹倒沙上鵁鶄老只今何處有新詩好在小春十月醉翁辭醉落魄瓊搓粉滴南枝只報江南拆横斜疎影溪邊窄翦碎白雲分付隴頭客氷肌綽約疑姑射鉛華消盡見真色不隨桃李開紅白我爲東君來報春消息又賞梅梅花似雪賞花記得同懽悦更䦨猶自貪攀折不怯春寒酒要待明月如今月上花争發疎枝冷蘂對離缺人心只道花争别不道人心不似舊時節更漏子寶香缾桐葉巻蕩水㾗微還逺思鄉信覺春遲野梅初見時上潮風臨晩渡人欲過西江去吹塞管隴雲低江南花未知又絳紗籠金葉盖向曉燈花猶在氷未結小琉璃隴梅香滿枝雪無香花有意不是江南新寄霜月浄碧天寒玉樓人倚䦨落梅風宮煙如水温芳晨梅似雪相親數枝春惹香塵壽陽嬌面偏憐惜妝成一面花新鏡中重把玉纖勻酒初醺如夢令一枕懨懨春困記得小梅風韻何處最闗情嫩蘂初傳芳信堪恨堪恨誰傍横斜疎影又臘半雪梅初綻玉屑瓊英碎翦素豔與清香别有風流堪羡苞嫩蘂嫩羞破壽陽人面又疑是水晶宫殿雲女天仙寶宴吟賞欲黄昏風送一聲𦍑管煙淡霜淡月在畫樓西畔少年遊李景先江國陸郎封寄後獨自冠羣芳折時雪裏帶時燈下香面訝争光而今不怕吹𦍑管一任更繁霜玳筵賞處玉纖整後猶勝嶺頭香又楊大年江南節物水昏雲淡飛雪滿前村千㝷翠嶺一枝芳豔迢遞寄歸人壽陽妝罷氷姿玉態的的寫天真等閒風雨又紛紛更忍向笛中聞生查子青帝曉來風偏傍梅梢緊未放玉肌開巳覺龍香噴此意比佳人争奈非朱粉惟有許飛瓊風味依稀近又朔風吹凍雲雲破天容碧新月過溪來隐見横雲色天與水争妍花與月争白一倩管城君寄此春消息梅苑巻十
