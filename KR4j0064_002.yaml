body:
  text: 梅苑卷二宋黃大輿編驀山溪曹元寵洗妝真態不在鉛華御竹外一枝斜想佳人天寒日暮黃昏小院無處著清香風細細雪垂垂何况江頭路月邊疏影夢到消魂處結子欲黃時又須作亷纖微雨孤芳一世供斷有情愁消瘦却東陽也試問花知否又氷肌玉骨不與凡花數一㸃破清香這心情更誰為主愁春歸晚時被雨亷纖瓊枝上淚淋浪似恨孤芳處幽姿標格獨向江頭路擬待使君來把芳心丁寧分付疏籬茆舍回首試輕辭爭望逺嫁東風對玉堂同處又梅傳春信又報年華晚昨夜半開時似雪到梢頭未遍凝酥綴粉綽約玉肌膚香黯淡月朦朧誰是黃昏伴故園深處想見孤根暖千里未歸人向此際只回淚眼憑誰為我折寄一枝來凝睇久俯層樓忍更聞羌管又清江平淡踈雨和煙染春在廣寒宮付江梅先開素豔年年第一相見越溪東雲體態雪精神不把年華占山亭水榭别恨多銷黯又是主人來更不負香心一㸃題詩才思清似玉壺氷輕回顧落尊前桃杏聲華減又素苞淡注自是東君試占斷隴頭光正雪裏前村獨步一枝竹外日暮怯輕寒山色逺水聲長寂寞江頭路小橋斜渡人靜銷魂處淡月破黃昏疏影浮清香暗度竹籬茅舍斜倚為誰愁應有恨負幽情惟恐風姨妒又沙塘水淺又一番春信玉體不知寒襯修篁幾苞隱映幽香荏苒不讓灑薔薇彎月冷漫漣漪雲斷清香影朱扉深處謝絶塵埃境百草未開花霜雪裏教伊孤另東風世態只戀碧桃枝曲玉管且休吹免使成遺恨又前村昨夜先報春消息庾嶺一枝開見行人頻頻顧惜東君布巧妝蘂似裁成疏竹外小溪邊雪裏藏春色朔風吹綻不假和風折根暖獨亨嘉向百花頭先占得髙樓羌笛且勸莫悽然協帝夢起商巖須盡調羮力又氷肌玉骨未假鉛黃借豈是占年芳又只恐嫌春不嫁十分清瘦可􅴲有閒愁沙路晚雪村晴半幅江南畫林間繫馬曽憶關山夜醉袖惹香歸誤幾回燈前嬌雅如今老矣無計奈春何人去後獨來時風月閒亭榭又前村雪裏度一枝春信况自占年芳淡妝梳常嫌脂粉櫻唇輕捧何似鶴頭紅香陳陳回輿認摘有金巵醖佳人嗅處微把香塵噴懊惱故無言使人見重重再問它年寄與惟有隴頭人春未困香尤嫩好與添風韻又郊居牢落一水流清淺憶得去年冬數枝梅低臨水畔今朝重見把酒祝東風和雪看整凝眸宛若江南岸浮生瞥爾勸汝休嗟嘆不覺失芳心柳腰軟纖纖仍換一朝光景休恁作渾閒春不逺且追遊又辦尋芳宴又重黎默運可意縈人處清楚玉蕤仙獨幽棲村溪月塢氷腮露鬢佳致在西湖月出早雪消遲立馬紅牆序寒梢微蕚㸃㸃蠅頭許欲露小檀心似生怕施朱紅紫返魂香細堪弔獨醒人臨澤國襲清風且咏離騷句又前村雪裏漏泄春光早似待故人來束芳心幽香未老溪邊昨夜雨過却參橫雲旖旎玉玲瓏不遣纖塵到無情有意寂寞誰知道幽夢覺來時淡無言風清月暸何郎去後憔悴少新詩空悵望倚樓人玉笛霜天曉又竹籬茆舍底是藏春處玉菩鎖檀心帶黃昏輕煙細雨神清骨瑩端似雪堂仙臨歲晚傲寒威寂寞江村住瓊林閬苑有信終啼去冷暖笑凡情辨南枝北枝幾許靈芳絶豔知肯為誰容東閣裏西湖畔總與花為主又歲寒遼邈望斷江南信牆外一枝斜對蘭堂綺羅隱映水清月淡疑是壽陽妝煙浪急小橋橫㸃㸃疏清影天姿瀟灑不減瑶臺韻占斷玉樓春被松筠笑他孤冷幽人何在無處覔餘寒疏雨過淚㾗深枉了衷腸恨又翦綵梅花危欄獨倚往事思量遍回首掩朱扉斂雲鬟閒拈針線輕羅碎翦縫箇小梅花燈閃閃夜沉沉玉指輕輕撚寒苞素豔渾似枝頭見半折與初開誰贏得江南手段玉冠斜插惟恨缺清香風動處月明時不怕吹羌管又墨梅荆楚間鴛鴦梅賦此周忘機江南春信望斷人千里魂夢入花枝染相思同心並蒂鴛鴦名字嬴得一雙雙無限意凝煙水念逺教誰寄毫端寫興莫把丹青擬墨客要卿卿想臨池等閒抗洗香衣黯淡元不浣細塵憐縞袂東風裏只恐于飛起又畫梅孤村冬杪有景真堪畫茆舍繞疏籬見一枝寒梅瀟灑欲將詩句擬待說包容辭未盡意悠悠難把精神寫臨溪疏影都是前人話此外更何如更須索良工描下明窗淨几長做小圖看高樓笛儘放吹不怕隨聲謝又蠟梅黃苞初綻誰向江頭寄天賦與清香笑紅顔呈顔逞媚低垂花面不與衆爭妍尚向未先羣卉獨禀中央氣何須施巧㸃綴芳叢裏只恐暗尋香誤蜂兒歸來故壘玉纖折處金鍾邑相宜朔風寒空雪墜痛賞休辭醉又蠟梅梅梢破蕚巳見春心了别有淡容儀又不與嫣然同笑東風翦蠟簇作閙蛾兒氷未泮水猶寒散在千林表輕衫小帽行盡荒山道一點麝臍香惱看人多多少少月斜門掩消損怕黃昏清影亂翠幃深且喜歸來早又蠟梅小山蒼翠竹影橫窗畔青縷斷薰爐覺身居風臺月觀清香招近誰為值幽叢金作蓓蕾成花尚帶鵝黃淺漢宫半額未許人間見不比嶺前梅問無因天高水逺宜煙宜雨淡淡一枝春蘂好與綴新詩只恐氷生硯又蠟梅江南春信巳過長安路柳眼尚貪眠又爭知先傳春去東風漏泄休更殢垂楊深雪裏一枝開誰占先春處當時馬上回首曽凝顧水淺月黃昏倚瓊枝誰家亭户一聲羌管遺恨到如今憑欄處賞花時莫使花輕負又野梅當時曽見上苑東風暖今歲却相逄向煙村亭邊驛畔垂鞭立馬一晌黯無言江南信壽陽人悵望成腸斷瓊妝雪綴滿野空零亂誰是倚䦨干更那堪鳴笳吹管疏枝殘蘂猶懶不嬌春水清淺月黃昏冷淡從來慣梅花引劉均國千里月千山雪梅花正落寒時節一枝昻一枝藏清香冷豔天賦與孤光孤光似被珠簾隔風度煙遮好顔色粉垂垂玉纍纍先春挺秀不管百花知似霜結與霜别莫使幽人容易折短牆邊矮窗前橫斜峭影重疊鬬嬋姢黃昏慣聽樓頭角只恐聽時零亂落醉來看縈絆麗人瀟灑倚䦨干又園林靜蕭索景寒梅漏泄東君信探春回探春回四時却被伊家苦相催夭桃紅杏誇顔色爭似情懷雪中折綻芬芳噴清香壽陽宫裏愛學靚梳妝江村畔開爛漫看看又近年光晚冒嚴寒冒嚴寒遊蜂戲蝶莫作等閒看故人别後知何處春色嶺頭逢驛使贈新詩折高枝樓上一聲羌管不須吹緑頭鴨斂同雲破臘雪霽前村占陽和孤根先暖數枝巳報新春如青女謾同素質笑姑射難竝天真疏影橫斜澄波清淺暗香浮動月黃昏山驛畔行人立馬回首幾銷魂江南逺隴使趂程踏盡氷㾗有箇人人玉肌偏似移我索對金尊撚纖枝鬢邊斜戴嗅芳蘂眉暈潛分素臉籠霞香心噴日壽陽妝罷酒初醒待調鼎須貪結子忍見落紛紛宿天曉愁聞畫角聲斷譙門花犯周美成粉牆低梅花照眼依然舊風味露㾗輕綴凝淨洗鉛華無限清麗去年勝賞曽孤倚氷盤同宴喜更可惜雪中高樹香篝薰素被今年對花最忽忽相逄似有恨依依愁悴凝望久青苔一簇春飛墜相將見脆圓薦酒人正在空江煙浪裏但夢想一枝瀟灑黃昏斜照水金盞倒垂蓮依約疏林見盈盈春意幾㸃霜蕤應是東君試手作芳菲粉面倚天風微笑是日暖雪巳晴時人靜么鳯翩翩踏碎殘枝幽香渾無著處甚一般雨露獨占清竒淡月疏雲何處不相宜陌上報春來也但緑晴青子離離桃香應仗先容次第追隨梅香慢高閣寒輕映萬朵芳梅亂堆香雪未待江南早冠百花先占一陽佳節翦綵凝酥無處學天然竒絶便壽陽妝工夫費盡豔姿終别風裏弄輕盈掩珠英明瑩待臘飄烈莫放芳菲歇剩永宵歡賞酒酣吟折倒玉何妨且聽取尊前新闋怕笛聲長行雲散盡謾悲風月罥馬索曉窗明庭外寒梅向殘月吳溪庾嶺一枝偷把陽和泄氷姿素豔自然天賦品格真香殊常别奈北人不識南枝喚作臘前杏先發竒絶照溪臨水素禽飛下玉羽瓊芳聞清潔懊恨春來何晚傷心鄰婦爭先折多情立馬待得黃昏疏影好似微酸結恨馬融一聲羌笛起處紛紛落如雪甘露歌王介甫折得一枝香在手人間應未有疑是經春雪未消今日是何朝盡日含毫難比興都無色可竝萬里晴天何處來真是屑瓊瑰天寒日暮山谷裏的皪愁成水地上漸多枝上稀唯有故人知六么令晏同叔雪殘風信悠揚春消息天涯倚樓新恨楊柳幾絲碧還是南雲鴈少錦字無端的寶叉瑶席香溢歌聲拚作尊前未歸客遙想疏梅此際月底香英白别後誰繞前溪手揀繁枝摘莫道傷高恨逺付與臨風笛儘堪愁寂花時往來更有多情箇人憶定風波慢漏新春消息前村數枝楚梅輕綻闕雪豔精神冰膚淡紵姑射依稀見冷香凝金蘂淺青女饒伊妒無限堪羡似壽陽妝閣初勻粉靣纖條緑染異羣葩不似和風扇向深冬免使遊蜂舞蝶撩撥春心亂水亭邊山驛畔立馬行人暗腸斷吟戀又忍隨羌管飄零千片慶春澤曉風嚴正蕭然園薄霧微罩梅漸弄白聳危苞勻勝胭脂半㸃瓊瑰小望江南信息何杳縱壽陽妍姿學就新妝暗香須少幽豔滿寒梢更遊蜂舞蝶渾無飛繞天賦品格借東皇施巧孤根占得春前俊笑雪霜謾欺容貌况此花高强終待和羮肯饒芳草風流子李坦然東君雖不語年華事今歲恰如期向寒雨望中曉霜清處領些春意開兩三枝又不是山桃紅錦爛溪柳緑搖絲别是一般孤高風韻終裁纖蕚冰翦芳蕤清香逺有意輕飄度勾引幾句新詩須是放懷追賞莫恁輕離更嫦娥為愛寒光滿地故移踈影來伴南枝誰道壽陽妝淺偏入時宜尉遲杯歲云暮歎光陰苒苒能幾許江梅尚怯餘寒長安信音猶阻春風無據憑䦨久欲去還凝竚憶溪邊月下裴回暗香疏影庭户朝來凍解霜消南枝上香英數點微露把酒看花無言有淚還是那時情緒花依舊辰妝何處謾嬴得花前愁千縷儘高樓畫角頻吹任教紛紛飛絮木蘭花慢望陽生漸布見梅蕚暖初回向雪裏一枝才苞素豔巳占春臺煙籠半含粉靣透清香暗觸滿襟懷可惜前村望斷魏林庾嶺栽培皚皚嫩蘂清光凝笑也恁風猥但折取行人途中對酒不用尊罍分芳正當歲暮謾休誇桃李苦相催早報明年律應又還依舊先開又飽經霜古樹怕春寒趂臘引青枝逗一點陽和隔年信息逺報佳期淒葩未容易吐但凝酥半靣㸃胭脂山路相逄駐馬暗香微染征衣風前裊裊含情雖不語引長思似怨感芳姿山高水逺折贈何遲分明為傳驛使寄一枝春色寫新詞寄語市橋官柳此先占了芳菲最高樓梅花好千萬君須愛比杏兼桃猶百倍分明學得嫦娥樣不施朱粉天然態蟾宮裏銀河畔風霜耐嶺上故人千里外寄去一枝君要㑹表江南信相思㬠清香素豔應難對滿頭宜向尊前戴歲寒心春消息年年在尾犯輕風淅淅正園林蕭索未回暖律嶺頭昨夜寒梅初發一枝消息香苞漸折天不許雪霜欺得望東吳驛使西來為誰折贈春色玉瑩氷清容質逈不同羣花品格如曉妝勻罷壽陽香膾徐妃粉額好把瓊英摘頻醉賞舞筵歌席休待聽嗚咽臨風數聲月下吹笛望逺行重陰未解又旱是年時梅花爭綻暗香浮動疏影橫斜月淡水清亭院好是前村雪裏一枝開處昨夜東風布曖動行人多少離愁腸斷凝戀天賦自然雅態似壽陽初勻粉靣故人折贈欣逄驛使只恐隴頭春晚寄與高樓休學龍吟三弄留取瓊花爛漫正有人同倚䦨干爭看寶鼎現東君著意化工恩被灼灼妖豔裊嫩梢輕善縈風惹露偏早香英綻似向人故矜誇標致倚欄全如顧盼尚困怯餘寒柔情弱態天真無限斷橋壓柳時非淺先百花風光獨占當送臘初歸迎春欲至芳姿偏婉㜻料碎翦就繒紈輝麗更把胭脂重染自賦得一般容冶宛勝神仙妝臉折送小閣幽窗酷愛處令親几硯儘孜孜觀賞不枉人稱妙選待密付如膏雨澤淡淡仍妝點任擾擾百卉千花掩迹一時羞見望梅花蒲傳正一陽初起暖力未勝寒氣堪賞素華長獨秀不竝開紅抽紫青帝只應憐潔白不使雷同衆卉淡然難比粉蝶豈知芳蘂半夜捲簾如乍失只在銀蟾影裏殘雪枝頭君認取自有清香旖旎又寒梅堪羡堪羡輕苞初展被天人製巧妝素豔羣芳皆賤碎翦月華千萬片綴向瓊枝欲遍小庭幽院雪月相交無辨影玲瓏何處臨溪見謝家新宴别有清香風際轉縹眇著人頭面梅苑卷二
