body:
  text: 梅苑卷六宋黃大輿編减字木蘭花十首有序李子正竊以花雖多品梅最先春始因暖律之潛催正值氷澌之初泮前村雪裏巳見一枝山上驛邊亂飄千片寄江南之春信與隴上之故人玉臉娉婷如壽陽之傅粉氷肌瑩徹逞姑射之仙姿不同桃李之繁枝自有雪霜之素質香欺青女冷耐霜娥月淺溪明動詩人之清興日斜烟暝感行客之幽懷偏宜淺蘂輕枝最好暗香疏影况是非常之標格别有一種之風情劇憐好景難拋那更綵雲易散憑䦨賞處巳遍南枝兼北枝秉燭看時休問今日與昨日且輟龍吟之三弄更停畫角之數聲庾嶺將軍久思止渴傅巖元老専待和羮豈如凡卉之嬌春長賴化工而結實又况風姿雨質曉色暮雲日邊月下之妖嬈雪裏霜中之豔冶初開微綻欲落驚飛取次芬芳無非竒絶錦囊佳句但能髣佛芳姿皓齒清歌未盡形容雅態追惜花之餘恨舒樂事之餘情試綴蕪詞編成短闋曲盡一時之景聊資四座之歡女伴近前鼓子祇候總題梅梢香嫩雪裏開時春粉潤雨蘂風枝暗與黃昏取次宜日邊月下休問初開兼欲謝却最妖嬈不似羣花春正嬌風東風吹暖輕動枝頭嬌豔顫片片驚飛不似城南畫角吹香英飄處定向壽陽妝閣去莫損柔柯今日清香逺更多雨瀟瀟細雨雨歇芳菲猶淡竚密灑輕籠濕遍柔枝香更濃瓊腮微膩疑是凝酥初㸃綴冷豔相宜不似梨花帶雨時雪六花飛素飄入枝頭無覔處密綴輕堆只似香苞次第開欄邊欲墜姑射山頭人半醉牆外低垂窺送佳人粉再吹月寒蟾初滿正是枝頭開爛漫素質籠明多少風姿無限情暗香踈影氷麝蕭蕭山驛靜淺蘂輕枝酒醒更䦨夢斷時日騰騰初照半折瓊苞還似笑莫近柔條只恐凝酥暖欲消三竿巳上㸃綴胭脂紅蕩漾剛道宜寒不似前村雪裏看曉急催銀漏漸漸紗窗明欲透㸃綴花枝曉笛吹時幾片飛淡煙初破髣佛夜來飛幾朵淺粉餘香晨起佳人帶曉妝晚天寒欲暮别有一般姿媚處半墜斜陽寶鑑微開試晚妝淡煙輕處漸近黃昏香暗度休怕春寒秉燭重來仔細看早陽和初布入蕚春紅才半露暖律潛催與占百花頭上開香英微吐折贈一枝人巳去楊柳貪眠不道春風巳暗傳殘香苞漸少滿地殘英寒不掃傳語東君分付南枝桃李春東風吹暖南北枝頭開爛漫一任飄吹巳占東風第一枝鷓鴣天借問枝頭昨夜春巳傳消息到柴門頻看秀色無多豔拖得清香不見㾗山矗矗水潾潾村南村北冷銷魂人間不識春風面羞見瑶臺破月明又冷落人間晝掩門泠泠殘粉縠成紋幾枝踈影溪邊見一拂清香馬上聞氷作質月為魂蕭蕭細雨入黃昏人間暫識東風信夢繞江南雲水村又誰折南枝傍小叢佳人丰色與梅同有花無葉真瀟灑不問胭脂借淡紅應未許嫁春風天教雪月伴玲瓏池塘踈影傷幽獨何似橫斜酒盞中又夢草池塘春意回巧傳消息是寒梅北枝休羡南枝暖憑仗東風次第開酥㸃蕚粉勻腮未攀巳得好香來西鄰且莫吹羌笛留待行春把酒杯又不怕微霜㸃玉肌恨無流水照氷姿與君著意從頭看初見今年第一枝人醉後雪晴時江南春色寄來遲使君本是花前客莫怪殷勤為賦詩又雪屋氷牀深閉門縞衣應笑織成紋雨中清淚無人見月下幽香只自聞長在眼逺銷魂玉奴那忍負東昏偶然摘墜行雲去不入春風花柳村又小檻冬深未破梅孤枝清瘦耐風埃月中寂寞無人管雪裏蕭踈近水栽微雨過早春回陽和消息自天來託根多謝東君力瓊蘂苞紅一夜開又春入江梅破晚寒凍枝驚鵲語聲乾離愁滿抱人誰問病耳初聞心也寬風細細露珊珊可堪驛使道漫漫斜梢待得人來後簮向烏雲仔細看又孔處度却月凌風度雪情何郎高詠照花明一枝弄碧傳幽信半額塗黃拾晚榮春思淡暗香輕江南雨冷若為情猶勝逺隔瀟湘水忽到窗前夢不成又蠟梅别得東皇造化恩黛消鉛褪自天真耻隨庾嶺花爭白疑是東籬菊返魂風淡淡月盈盈麝煤沈馥動孤根寒蟬冷蝶知何處惟有蜂房不待春又蠟梅邵叔齊不比江梅粉作花天香肯作俗香誇高懸蠟蓓蜂房密遍掛金鐘鴈字斜侵月影上窗紗中央顔色自仙家玉人插向烏雲畔渾似靈犀正透芽浣溪紗王輔道雪裏東風未過江隴頭先折一枝芳如今踈影照溪塘北客乍驚無緑葉東君應笑不紅妝玉真愛著淡衣裳又毛澤民月樣嬋娟雪樣清索强先占百花春于中形外好精神多病肌膚元自瘦半妝殘粉不忺勻十分渾似那人人又水淨煙閒不染塵小山斜卧幾枝春夜寒香惹一溪雲粉淡朱輕妝未了十分孤迥好精神為伊清瘦却愁人又孫仲益弱骨輕肌不耐春一枝江路玉梅新巡簷索笑為何人素影裴回波上月醉香搖蕩竹間雲酒醒人散夢仙村又尉困觀梅毛澤民曽向瑶臺月下逄為誰回首矮牆東春風吹酒褪腮紅庾嶺殷勤通逺信梅家瀟灑有仙風晚香都在酒杯中又苒苒飛雲橫畫䦨黃昏煙雨滿江干小梅香淺不禁寒樓上風輕簾不卷酒紅銷盡晝妝殘玉人斜撚一枝看又十月開花是子真小春分付與精神折來含露曉妝新暖意便從窗下見粉容何待鑑中勻宛然長似玉華清又梅粉初嬌擬嫩腮一枝春信臘前開玉英珠顆傍妝臺明月泛將疏影去暗香疑是那人來銷魂獨自立空階又初春泛舟時北山積雪盈尺而水南梅盛開毛澤民水北煙寒雪似梅水南梅閙雪千堆月明南北兩瑶臺雲近恰如天上座魂清疑向北邊來梅花多處載春回又茶梅翦碎紅娘舞舊衣漢宫妝粉滿瓊枝東風來晚未曽知顔色不同香小異瑶臺春近宴回時寶燈相引素娥歸又蠟梅梅與為名蠟與容寒枝遍綴小金鐘插時只恐鬢邊鎔疑是佳人燻麝月起來風味入懷濃暗香依舊月朦朧又蠟梅梅與稱名蠟與黃枝無裊娜色無光掩檀欺麝冠羣芳結處定緣蜂力就開時微帶蜜脾香風標不減壽陽妝太常引行雲蹤迹杳無期梅梢上又春歸不道久别離這一度清香為誰多情囑付庾樓羌管憑仗且休吹留取兩三枝待和淚封將寄伊又江梅開似蘂珠宮報桃李又春風驀地看前峰待摘取橫斜盞中魏林楚嶺素妝清絶不與衆芳同和月映簾櫳羡幾㸃施朱太紅小重山竹裏清香簾影門一枝照水弄精神樓頭橫管罷龍吟休三弄留為與調羮紫陌與青門溪邊浮動處絶纎塵等閒休付壽陽人瀟灑處月淡又黃昏又不是蛾兒不是酥化工應道也難摹花兒清瘦影兒孤多情處時有暗香浮試問玉肌膚夜來雪霜重怕寒無一枝欲寄洞庭姝可惜許只有鴈銜蘆又天際春來都為君依稀丹蕚動波雲惱人天氣近黃昏霜月底山麝鬭微薰標格自天真壽陽仙骨瘦玉無紋芳容臨鑑洗餘醺雙蛾穩花面兩難分西地錦不與羣花相續獨占春光速幽香逺逺散西東惟竹籬茅屋羌管誰調一曲送月夜猶芬馥忍君折取向玉堂只這些清福又嶺上初消殘雪有梅花先折東君造化多成翠巧風韻竒絶小院黃昏時節暗香浮疏影橫斜寄取和羮未晚却免教攀折踏歌帶雪向南枝一朵紅梅折許多時甚處收香白占千葩百卉先春色凝瑩潔正廣寒宮殿人窺隔銷魂處畫角數聲徹暗香浮動黃昏月最瀟灑處最竒絶孤標迥不與羣芳列吟賞竟連宵痛飲無休歇輸有心牧童偷折感皇恩翦玉蹙花苞臘寒時候間竹橫溪自清瘦黃昏浮動拂拂暗香微透壽陽妝面恨眉頻鬭堪賞占斷三春先手不是東君意偏有百花羞盡故教孤芳獨秀只愁明月夜笛聲奏枕屏兒江國春來留得素英肯住月籠香風弄粉詩人盡許酥蘂嫩檀心小不禁風雨須東君與他做主繁杏夭桃顔色淺深難駐奈芳容全不稱氷姿伴侣水亭邊山驛畔一枝風措十分似那人淡竚憶秦娥房舜卿與君别相思一夜梅花發梅花發淒凉南浦斷橋斜月盈盈微步凌波襪東風笑倚天涯闊天涯闊一聲羌管暮雲愁絶又瑶臺月寒光零亂䝉香雪䝉香雪橫枝踈影動人清徹分明姑射神仙骨氷姿雪裏難埋沒難埋沒百花頭上為春先發望江南梅花好滿樹錦江邊不似武陵曽見日清香冷豔撲尊前銷得醉留連憑造化分付與花權巳共雪光爭臘早且將春信為君傳桃李莫誇先又梅花好依約透春光記得佳人初睡起巧臨鸞鑑試新妝粉面鬭瓊芳江亭上繞樹嗅清香擬把一枝傳信去不知何處是蘭房獨自暗淒凉品令山重雲起斷橋外池塘水曉來風定竹枝相亞殘陽影裏多少風流都在冷香踈蘂江南千里問折得誰能寄幾番歸去酒醒月滿䦨干十二且隱深溪免笑等閒桃李又一陽生暖見庾嶺梅初綻瓊枝玉樹渾如傅粉壽陽妝面疏影橫斜隱隱月溪清淺前村雪裏向雪裏真難辨倩誰說與高樓人道休吹羌管且與從容來嵗和羮未晚又雪花飛墜有人報江南意博山爐畔硯屏風裏銅盤寒水賦得幽香踈淡數枝相倚絳膚黃蘂令一種高標致笛中芳信嶺頭春色不傳紅紫寂寞閒亭月下夜䦨影碎相思引笑盈盈香噴噴姑射仙人風韻天與肌膚常素嫩玉面猶嫌粉斜倚小樓凝逺信多少往來人恨只恐乘雲春雨因迤邐嬌容損又半苞紅微露粉瀟灑早梅猶嫩香入夢魂殘酒醒芳意相牽引不畏曉霜侵手冷欲折一枝芳信折得却無人寄問爭信相思損好女兒戎州賞梅山谷道人小院一枝梅衝破曉寒開偶到張園游戲霑袖帶香回玉酒覆銀杯盡歸去猶待重來東鄰何事驚吹怨笛雪片成堆慶金枝新春入舊年綻梅蕚一枝先隴頭人待信音傳算楚岸未香殘小枕風雪憑䦨干下簾幕護輕寒年華永占入芳筵付尊前漸成歡梅苑卷六
